<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="100%" style="max-width:720px;font-family:system-ui,sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b71c1c"/></marker></defs><rect width="720" height="260" fill="#fffaf5" rx="14"/><text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">GIP A/B/C路径</text><rect x="30" y="45" width="120" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="90" y="62" text-anchor="middle" font-size="9" font-weight="600">GIP-A</text><text x="90" y="78" text-anchor="middle" font-size="8" fill="#6b7280">S$1,000万</text><text x="90" y="92" text-anchor="middle" font-size="8" fill="#6b7280">投资企业</text><line x1="152" y1="72" x2="188" y2="72" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="190" y="45" width="120" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="250" y="62" text-anchor="middle" font-size="9" font-weight="600">GIP-B</text><text x="250" y="78" text-anchor="middle" font-size="8" fill="#6b7280">S$2,500万</text><text x="250" y="92" text-anchor="middle" font-size="8" fill="#6b7280">投资基金</text><line x1="312" y1="72" x2="348" y2="72" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="350" y="45" width="120" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="410" y="62" text-anchor="middle" font-size="9" font-weight="600">GIP-C</text><text x="410" y="78" text-anchor="middle" font-size="8" fill="#6b7280">AUM≥S$2亿</text><text x="410" y="92" text-anchor="middle" font-size="8" fill="#6b7280">家办路径</text><line x1="472" y1="72" x2="508" y2="72" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="510" y="45" width="180" height="55" rx="10" fill="#fce4e4" stroke="#b71c1c" stroke-width="2"/><text x="600" y="62" text-anchor="middle" font-size="9" font-weight="700">直接PR(5年REP)</text><tex