*{box-sizing:border-box}html,body{margin:0;max-width:100%;overflow-x:hidden}body{background:#f4f7fb;color:#162033;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif;line-height:1.72;font-size:15px}.hero{background:linear-gradient(135deg,#071a3d,#143d78);color:#fff;padding:26px 16px;text-align:center}.hero h1{font-size:24px;margin:0 0 8px}.hero p{margin:0;color:#dbeafe}.wrap{max-width:980px;margin:0 auto;padding:12px}.card{background:#fff;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 2px 10px rgba(15,23,42,.07);border:1px solid #e5edf7}.chapter{border-left:5px solid #1d4ed8}.chapter>h2{font-size:22px;color:#0b2a5b;margin:0 0 12px;padding-bottom:10px;border-bottom:2px solid #e5edf7}.country-block{border:1px solid #dbe7f7;border-radius:16px;margin:14px 0;background:#fbfdff;overflow:hidden}.country-head{background:linear-gradient(90deg,#eff6ff,#f8fbff);padding:12px 14px;border-bottom:1px solid #dbe7f7;display:flex;align-items:center;justify-content:space-between;gap:10px}.country-head h3{font-size:17px;margin:0;color:#123b73}.badge{font-size:12px;background:#dbeafe;color:#1d4ed8;border-radius:999px;padding:4px 9px;font-weight:800}.country-body{padding:14px}.toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px}.toc a{display:block;text-align:center;text-decoration:none;background:#eef5ff;color:#1d4ed8;border-radius:10px;padding:8px 6px;font-weight:700;font-size:13px}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.summary{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px}.summary b{color:#0b2a5b}table{width:100%;border-collapse:collapse;margin:12px 0;display:block;overflow-x:auto;border-radius:12px}th,td{border:1px solid #e2e8f0;padding:8px;vertical-align:top;min-width:90px}th{background:#eef5ff;color:#0b2a5b}p{margin:8px 0}h4{font-size:16px;color:#0f3b82;margin:16px 0 8px}h5{font-size:15px;color:#1e3a8a;margin:12px 0 6px}blockquote{background:#fff7ed;border-left:4px solid #f97316;padding:10px 12px;border-radius:10px;color:#7c2d12}.flow{background:#f8fafc;border:1px solid #dbe7f7;border-radius:16px;padding:12px;margin:12px 0}.flow-title{font-weight:900;color:#0b2a5b;margin-bottom:8px}.flow-steps{display:flex;flex-direction:column;gap:8px}.step{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:10px}.num{width:26px;height:26px;background:#1d4ed8;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}.arrow{text-align:center;color:#1d4ed8;font-weight:900}.graphic{background:linear-gradient(135deg,#eef6ff,#f8fafc);border:1px solid #bfdbfe;border-radius:16px;padding:14px;margin:12px 0}.graphic .gtitle{font-weight:900;color:#0b2a5b;margin-bottom:8px}.graphic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.gbox{background:#fff;border:1px solid #dbe7f7;border-radius:12px;padding:10px;text-align:center;font-weight:700;color:#334155}.expand-actions{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;position:sticky;top:0;background:#fff;z-index:5;padding:8px 0}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.btn-primary{background:#2563eb;color:#fff}.btn-green{background:#059669;color:#fff}.expand-panel{display:none;border:2px solid #2563eb;border-radius:14px;overflow:hidden;margin-top:10px}.expand-panel.on{display:block}.expand-panel iframe{width:100%;height:calc(100vh - 96px);min-height:620px;border:0}.warn{background:#fff1f2;color:#991b1b;border:1px solid #fecdd3;border-radius:12px;padding:10px;font-weight:700}.check{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;border-radius:12px;padding:10px;font-weight:700}.commission{background:#111827;color:#fff;border-radius:18px;padding:18px;margin:14px 0}.commission h2{color:#fff}.small{font-size:12px;color:#64748b}@media(max-width:640px){.hero h1{font-size:20px}.wrap{padding:8px}.card{padding:14px;border-radius:14px}.chapter>h2{font-size:19px}.country-head{display:block}.country-head h3{margin-bottom:8px}th,td{font-size:12px;padding:6px}.btn{width:100%;text-align:center}.summary-grid{grid-template-columns:1fr}}
</style></head><body><div id="app"><div class="hero"><h1>正在生成 V21 统一章节版融合策划案...</h1></div></div>
<script>
(function(){
const C={hk:{n:'香港',f:'香港/exec'},sg:{n:'新加坡',f:'新加坡/exec'},tr:{n:'土耳其',f:'土耳其/exec-realestate-购房'},us:{n:'美国',f:'美国/exec'},au:{n:'澳大利亚',f:'澳大利亚/exec'},nz:{n:'新西兰',f:'新西兰/exec'},jp:{n:'日本',f:'日本/exec'},eu:{n:'欧洲',f:'欧洲/exec'},dm:{n:'多米尼克',f:'多米尼克/exec'},vu:{n:'瓦努阿图',f:'瓦努阿图/exec'},ge:{n:'格鲁吉亚',f:'格鲁吉亚/exec'}};
const CH=['一、客户家庭基本信息','二、核心策略','三、合规清理详细方案','四、境外资金归集与投资架构','五、投资使用建议','六、财富架构搭建方案','七、税务分析','八、资金跨境合规方案','九、身份路径规划','十、教育规划','十一、福利居住国规划','十二、预算明细汇总','十三、执行时间轴','十四、财税执行策划案全文','十五、重要风险声明与附件'];
const TAX_KEY='财税/exec';
function q(k){return new URL(location.href).searchParams.get(k)||''}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function norm(x){return String(x||'').toLowerCase().replace(/[\s_]+/g,'-')}
let cs=(q('countries')||'sg,tr,au').split(',').filter(Boolean);
let pr=(q('projects')||'sg:sg-ep-pic|tr:tr-fund-cbi|au:au-482-sid').split('|').filter(Boolean);
let projects={};pr.forEach(x=>{let i=x.indexOf(':'); if(i>0){let c=x.slice(0,i); projects[c]=(projects[c]||[]).concat(x.slice(i+1).split(',').filter(Boolean).map(decodeURIComponent));}});
function projectName(p){if(/asmtp|专才/i.test(p))return 'ASMTP 专才计划';if(/eb-?1a/i.test(p))return 'EB-1A Extraordinary Ability';if(/482/i.test(p))return '482 SID 技能需求签证';if(/fund|基金/i.test(p))return '基金投资入籍 + 美国E-2跳板';if(/realestate|购房/i.test(p))return '购房投资入籍';if(/ep/i.test(p))return 'EP / EP-PIC 自雇投资公司';return p||'国家综合路径'}
const REG=(window.FINAL_SINGLE_REGISTRY&&window.FINAL_SINGLE_REGISTRY.entries)||[];
function finalEntry(c,p){let token=norm(p);let arr=REG.filter(e=>e.country===c&&e.status==='final'&&e.url);let exact=arr.filter(e=>(e.patterns||[]).some(pt=>token===norm(pt)));if(exact[0])return exact[0];let hit=arr.filter(e=>(e.patterns||[]).some(pt=>token.includes(norm(pt))||norm(pt).includes(token)));return hit[0]||arr[0]||null}
function selectedItems(){let out=[];cs.forEach(c=>(projects[c]&&projects[c].length?projects[c]:['__country__']).forEach(p=>out.push({c,p,entry:finalEntry(c,p)})));return out}
const items=selectedItems();
function md2h(md, title){md=String(md||'').replace(/\uFFFD/g,'').trim(); if(!md)return '<p>本章节按完整单项目模块展开，详见上方“展开方案”。</p>'; let lines=md.split('\n'), out=[], table=[];
function flushTable(){if(table.length){out.push('<table>'+table.map((r,i)=>'<tr>'+r.map(c=>i===0?'<th>'+esc(c)+'</th>':'<td>'+esc(c)+'</td>').join('')+'</tr>').join('')+'</table>');table=[]}}
function flowFromText(txt,ttl){let st=txt.split('\n').map(x=>x.trim()).filter(x=>x&&!/^[↓→\-·]+$/.test(x)); if(st.length<2)return '<div class="flow"><div class="flow-title">'+esc(ttl||'图形化流程')+'</div><p>'+esc(txt)+'</p></div>'; return '<div class="flow"><div class="flow-title">'+esc(ttl||'图形化流程')+'</div><div class="flow-steps">'+st.map((x,i)=>'<div class="step"><div class="num">'+(i+1)+'</div><div>'+esc(x)+'</div></div>'+(i<st.length-1?'<div class="arrow">↓</div>':'')).join('')+'</div></div>'}
for(let i=0;i<lines.length;i++){let ln=lines[i]; if(/^```/.test(ln.trim())){let buf=[];i++;while(i<lines.length&&!/^```/.test(lines[i].trim())){buf.push(lines[i]);i++} flushTable(); out.push(flowFromText(buf.join('\n'),'流程图')); continue}
 if(/^!\[([^\]]*)\]\(([^)]+)\)/.test(ln)){flushTable();let alt=(ln.match(/^!\[([^\]]*)\]/)||[])[1]||'架构/流程图';out.push('<div class="graphic"><div class="gtitle">'+esc(alt)+'（HTML图形化呈现，避免图片乱码）</div><div class="graphic-grid"><div class="gbox">客户/家庭</div><div class="gbox">资金与合规</div><div class="gbox">身份项目</div><div class="gbox">税务/风险管理</div></div></div>');continue}
 if(/^\|.*\|$/.test(ln)){let cells=ln.replace(/^\||\|$/g,'').split('|').map(x=>x.trim()); if(cells.every(c=>/^-{2,}:?$/.test(c.replace(/\s/g,''))))continue; table.push(cells); continue}else flushTable();
 if(!ln.trim())continue; if(/^#{1,6}\s+/.test(ln)){let t=ln.replace(/^#{1,6}\s+/,''); out.push('<h4>'+esc(t)+'</h4>')} else if(/^>\s+/.test(ln)) out.push('<blockquote>'+esc(ln.replace(/^>\s+/,''))+'</blockquote>'); else if(/^[-*]\s+/.test(ln)) out.push('<p>• '+esc(ln.replace(/^[-*]\s+/,''))+'</p>'); else out.push('<p>'+esc(ln)+'</p>')}
flushTable();return out.join('\n')}
function getSec(sections,canon){if(!sections)return'';let keys=Object.keys(sections);let aliases={[CH[3]]:['四、境外资金归集与投资架构','四、境外资金归集与生活安顿预算'],[CH[4]]:['五、投资使用建议','五、核心路径详解','五、选房指南','五、贡献与资格使用建议'],[CH[10]]:['十一、福利居住国规划','十一、福利规划']};let arr=aliases[canon]||[canon];for(let a of arr){let k=keys.find(k=>k.indexOf(a)===0||k.includes(a)); if(k)return sections[k]}return''}
function moduleCard(it){let e=it.entry,cname=C[it.c]?.n||it.c,pname=projectName(it.p); if(!e)return '<div class="country-block"><div class="country-head"><h3>'+esc(cname+' · '+pname)+'</h3><span class="badge">缺最终页</span></div><div class="country-body warn">未登记完整单项目最终页，禁止冒充合格输出。</div></div>';let panel='panel-'+e.id.replace(/[^\w-]/g,'-');let btn='btn-'+e.id.replace(/[^\w-]/g,'-');let url=e.url+'?from=fusion-v21-unified&return='+encodeURIComponent(location.href);return '<div class="country-block"><div class="country-head"><h3>'+esc(cname+' · '+pname)+'</h3><span class="badge">V21完整单项目</span></div><div class="country-body"><div class="check">已读取完整页：'+esc(e.url)+'</div><div class="expand-actions"><button class="btn btn-primary" id="'+btn+'" onclick="togglePlan(\''+panel+'\',\''+btn+'\',\''+url+'\')">展开方案</button><a class="btn btn-green" target="_blank" href="'+esc(url)+'">单独打开</a></div><div class="expand-panel" id="'+panel+'"></div></div></div>'}
window.togglePlan=function(panel,btn,url){let p=document.getElementById(panel),b=document.getElementById(btn);if(!p)return;let on=p.classList.contains('on');document.querySelectorAll('.expand-panel.on').forEach(x=>{if(x.id!==panel)x.classList.remove('on')});document.querySelectorAll('.btn-primary').forEach(x=>{if(x.id!==btn)x.textContent='展开方案'});if(on){p.classList.remove('on');b.textContent='展开方案';return}if(!p.querySelector('iframe'))p.innerHTML='<iframe src="'+url+'"></iframe>';p.classList.add('on');b.textContent='收起方案';setTimeout(()=>p.scrollIntoView({behavior:'smooth',block:'start'}),80)}
function chapterContent(canon){let html='<section class="card chapter" id="ch'+(CH.indexOf(canon)+1)+'"><h2>'+canon+'</h2>'; if(canon===CH[13]){let tax=FUSION_TEMPLATES[TAX_KEY];html+='<div class="country-block"><div class="country-head"><h3>全部国家/项目 · 财税执行策划案全文</h3><span class="badge">第14章</span></div><div class="country-body">'+md2h(tax&&tax.sections?Object.values(tax.sections).join('\n\n'):'财税模板加载中')+'</div></div>';return html+'</section>'}
 if(canon===CH[14]){items.forEach(it=>{let t=FUSION_TEMPLATES[C[it.c]?.f],body=t&&t.sections?getSec(t.sections,canon):'';html+='<div class="country-block"><div class="country-head"><h3>'+esc((C[it.c]?.n||it.c)+' · '+projectName(it.p))+'</h3><span class="badge">法案附件</span></div><div class="country-body">'+md2h(body||'法律法规与项目资源来源汇总：必须列明法案/政策名称、条款/章节、适用条件、约束风险、执行动作。')+'</div></div>'});return html+'</section>'}
 items.forEach(it=>{let t=FUSION_TEMPLATES[C[it.c]?.f],body=t&&t.sections?getSec(t.sections,canon):'';html+='<div class="country-block"><div class="country-head"><h3>'+esc((C[it.c]?.n||it.c)+' · '+projectName(it.p))+'</h3><span class="badge">'+esc(canon.split('、')[0])+'</span></div><div class="country-body">'+md2h(body,canon)+'</div></div>'});return html+'</section>'}
let html='<div class="hero"><h1>'+cs.map(c=>C[c]?.n||c).join(' + ')+' 融合执行策划案</h1><p>V21统一章节版｜15章框架 → 每章按国家/项目依次展开｜图片改HTML图形组件防乱码</p></div><div class="wrap"><section class="card"><h2>快速目录</h2><div class="toc">'+CH.map((c,i)=>'<a href="#ch'+(i+1)+'">'+(i+1)+'章</a>').join('')+'</div><div class="summary-grid"><div class="summary"><b>输出规则</b><br>统一按单国家单项目V21标准输出，不做短摘要。</div><div class="summary"><b>章节结构</b><br>15个大标题固定；每章下依次列国家/项目。</div><div class="summary"><b>图片规则</b><br>正文流程/架构改为HTML图形组件，避免图片中文字乱码。</div></div></section><section class="card chapter"><h2>完整单项目模块嵌入区</h2><p>先给每个单项目完整执行策划案入口；用户可展开查看手机端完整页。</p>'+items.map(moduleCard).join('')+'</section>';
CH.forEach(c=>html+=chapterContent(c));html+='<section class="commission"><h2>佣金/成本明细</h2><p>密码：888888。所有选中项目均须结构化展示服务费、底价、佣金、结佣周期、批次、对接人、状态。</p></section></div>';
document.getElementById('app').innerHTML=html;
})();
</script></body></html>
