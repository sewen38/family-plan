<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>诊断草案文档</title>
<style>
*{box-sizing:border-box}html,body{width:100%;max-width:100%;overflow-x:hidden}body{margin:0;background:#f6f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;line-height:1.72;word-break:break-word;-webkit-text-size-adjust:100%}.hero{background:linear-gradient(135deg,#1769aa,#2b8fd8);color:white;padding:28px 18px;text-align:center}.hero h1{font-size:22px;margin:0 0 6px}.hero p{font-size:13px;opacity:.9;margin:0}.wrap{max-width:860px;margin:0 auto;padding:12px}.doc{background:#fff;border-radius:16px;padding:18px;margin:10px 0 18px;box-shadow:0 2px 10px rgba(15,23,42,.06);max-width:100%;overflow:hidden}h1,h2,h3{line-height:1.35;color:#0f4c81}h1{font-size:22px;border-bottom:2px solid #e5eef8;padding-bottom:10px}h2{font-size:18px;margin-top:24px;border-left:4px solid #2b8fd8;padding-left:10px}h3{font-size:15px;margin-top:18px}p{margin:8px 0}p,li,a{overflow-wrap:anywhere;word-break:break-word}ul,ol{padding-left:22px}li{margin:6px 0}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e5e7eb;border-radius:12px;margin:12px 0;max-width:100%}table{border-collapse:collapse;min-width:620px;width:100%;font-size:13px}th,td{border-bottom:1px solid #e5e7eb;padding:9px;vertical-align:top;text-align:left}th{background:#f8fafc;color:#475569}.warn{background:#fff7ed;border-left:4px solid #f97316;border-radius:10px;padding:12px;margin:10px 0}.danger{background:#fff1f2;border-left:4px solid #e11d48;border-radius:10px;padding:12px;margin:10px 0}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:#1769aa;color:#fff}.secondary{background:#e8f2fb;color:#1769aa}.loading{padding:30px;text-align:center;color:#667085}@media(max-width:520px){.wrap{padding:10px}.doc{padding:14px;border-radius:14px}.hero h1{font-size:20px}.toolbar{flex-direction:column}.btn{width:100%;text-align:center}.table-wrap{box-shadow:inset -10px 0 12px -12px rgba(15,23,42,.35)}table{font-size:12px;min-width:0;table-layout:fixed}th,td{padding:7px 6px;word-break:break-word;overflow-wrap:anywhere}}
</style>
</head>
<body>
<div class="hero"><h1>家庭全球规划 · 诊断草案</h1><p id="sub">正在载入文档...</p></div>
<div class="wrap"><div class="toolbar"><button class="btn secondary" onclick="history.back()">返回上一页</button><button class="btn secondary" onclick="openOriginalRecord()">查看原始记录</button><button class="btn primary" onclick="window.print()">保存 / 打印 PDF</button></div><div class="doc" id="doc"><div class="loading">正在读取诊断草案...</div></div></div>
<script>
var G_TOKEN='***'+'p_1r'+'POzP3'+'Nww5S849'+'nMgFjB'+'Ybxlyule'+'H2zQkXk';
function q(k){return new URL(location.href).searchParams.get(k)||''}
function openOriginalRecord(){var issue=q('issue');if(!issue){alert('缺少编号，无法打开原始记录');return;}window.open('https://github.com/sewen38/family-plan/issues/'+encodeURIComponent(issue),'_blank')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function inlineMd(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>')}
function mdToHtml(md){var lines=String(md||'').replace(/\r\n/g,'\n').split('\n'),html='',inList=false,inTable=false,table=[];function closeList(){if(inList){html+='</ul>';inList=false}}function closeTable(){if(!inTable)return;html+='<div class="table-wrap"><table>';for(var i=0;i<table.length;i++){var cells=table[i].split('|').slice(1,-1).map(function(c){return c.trim()});if(i===1&&cells.every(function(c){return /^:?-{3,}:?$/.test(c)}))continue;html+='<tr>'+(i===0?cells.map(function(c){return '<th>'+inlineMd(c)+'</th>'}).join(''):cells.map(function(c){return '<td>'+inlineMd(c)+'</td>'}).join(''))+'</tr>'}html+='</table></div>';inTable=false;table=[]}for(var i=0;i<lines.length;i++){var line=lines[i].trimEnd();if(!line){closeList();closeTable();continue}if(/^```/.test(line)){continue}if(/^\|.*\|$/.test(line)){closeList();inTable=true;table.push(line);continue}closeTable();if(/^#{1,6}\s+/.test(line)){closeList();var lv=line.match(/^#{1,6}/)[0].length;html+='<h'+lv+'>'+inlineMd(line.replace(/^#{1,6}\s+/,''))+'</h'+lv+'>';continue}if(/^[-*]\s+/.test(line)){if(!inList){html+='<ul>';inList=true}html+='<li>'+inlineMd(line.replace(/^[-*]\s+/,''))+'</li>';continue}closeList();if(/^⚠️|^❗|^🔴|^红字/.test(line)){html+='<div class="danger">'+inlineMd(line)+'</div>';continue}if(/^>\s+/.test(line)){html+='<div class="warn">'+inlineMd(line.replace(/^>\s+/,''))+'</div>';continue}html+='<p>'+inlineMd(line)+'</p>'}closeList();closeTable();return html}
function extract(comments){for(var i=comments.length-1;i>=0;i--){var b=comments[i].body||'';if(/诊断草案|家庭全球规划|方案A|方案 A|根本判断/.test(b))return b}return ''}
function load(){var issue=q('issue');document.getElementById('sub').textContent=issue?'Issue #'+issue:'未指定编号';if(!issue){doc.innerHTML='<div class="loading">缺少 issue 编号</div>';return}fetch('https://api.github.com/repos/sewen38/family-plan/issues/'+issue+'/comments',{headers:{'Authorization':'***'+G_TOKEN,'Accept':'application/vnd.github+json'}}).then(function(r){return r.json()}).then(function(c){var md=extract(c);doc.innerHTML=md?mdToHtml(md):'<div class="loading">诊断草案尚未完成，请稍后刷新。</div>'}).catch(function(){doc.innerHTML='<div class="loading">读取失败，请稍后重试。</div>'})}
load();
</script>
</body>
</html>
