<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>批量评估结果汇总</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6f8;color:#1a1a1a;line-height:1.6;padding:0;padding-bottom:calc(140px + env(safe-area-inset-bottom,0px));word-break:break-word;-webkit-text-size-adjust:100%}

/* 顶部 */
.header{background:linear-gradient(135deg,#1565c0,#2196f3);color:#fff;padding:28px 20px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;margin-bottom:4px}
.header p{opacity:.85;font-size:13px}

/* 卡片 */
.card{background:#fff;border-radius:14px;padding:20px 16px;margin:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:17px;margin-bottom:8px;display:flex;align-items:center;gap:8px}

/* 国家区块 */
.country-section{margin-bottom:4px}
.project-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.project-item:last-child{border-bottom:none}
.project-item .check{color:#22c55e;font-size:16px;flex-shrink:0;margin-top:1px}
.project-item .info{flex:1;min-width:0}
.project-item .name{font-weight:600;color:#1a1a1a}
.project-item .detail{font-size:12px;color:#888;margin-top:2px}

/* 空状态 */
.empty{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* 底部按钮 */
.actions{display:flex;gap:10px;margin:12px;flex-wrap:wrap}
.actions button{flex:1;min-width:120px;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#1565c0,#2196f3);color:#fff}
.btn-secondary{background:#e8f0fe;color:#1565c0}
.actions button:active{opacity:.85}

/* 密码弹窗遮罩 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px 24px;width:90%;max-width:380px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:6px}
.modal p{font-size:13px;color:#888;margin-bottom:16px}
.modal input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:6px;letter-spacing:4px}
.modal input:focus{border-color:#2196f3}
.modal .hint{font-size:11px;color:#aaa;margin-bottom:16px}
.modal .btn-row{display:flex;gap:10px}
.modal .btn-row button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.modal .btn-confirm{background:linear-gradient(135deg,#1565c0,#2196f3);color:#fff}
.modal .btn-cancel{background:#f0f0f0;color:#666}
.modal .btn-row button:active{opacity:.85}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:480px){.header{padding:22px 14px}.card{margin:10px;padding:16px 12px}.actions{position:fixed;left:0;right:0;bottom:env(safe-area-inset-bottom,0px);z-index:50;background:#f5f6f8;padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));margin:0;box-shadow:0 -4px 18px rgba(15,23,42,.12);border-top:1px solid #e5e7eb}.actions button{width:100%;min-width:0;padding:12px 8px;font-size:14px;line-height:1.25}.modal{width:calc(100% - 24px);padding:22px 16px}.project-item{font-size:13.5px}}

.diagnosis-result{font-size:15px;line-height:1.8;color:#374151}.diagnosis-result h2{font-size:22px}.diagnosis-result h3{font-size:16px;margin-top:20px;color:#0b2a5b}.diagnosis-result blockquote{background:#f0f7ff;border-left:4px solid #2563eb;padding:14px 16px;border-radius:8px;margin:12px 0}.diagnosis-result table{font-size:14px}

.hero{background:linear-gradient(135deg,#1769aa,#2b8fd8);color:white;padding:28px 18px;text-align:center}.hero h1{font-size:22px;margin:0 0 6px}.hero p{font-size:13px;opacity:.9;margin:0}.wrap{max-width:860px;margin:0 auto;padding:12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:#1769aa;color:#fff}.secondary{background:#e8f2fb;color:#1769aa}.loading{padding:30px;text-align:center;color:#667085}.warn{background:#fff7ed;border-left:4px solid #f97316;border-radius:10px;padding:12px;margin:10px 0}.danger{background:#fff1f2;border-left:4px solid #e11d48;border-radius:10px;padding:12px;margin:10px 0}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e5e7eb;border-radius:12px;margin:12px 0;max-width:100%}@media(max-width:520px){.wrap{padding:10px}.hero h1{font-size:20px}.toolbar{flex-direction:column}.btn{width:100%;text-align:center}.table-wrap{box-shadow:inset -10px 0 12px -12px rgba(15,23,42,.35)}}
.diagnosis-result{font-size:15px;line-height:1.8;color:#374151}.diagnosis-result h2{font-size:20px;margin-top:24px}.diagnosis-result h3{font-size:16px;margin-top:18px;color:#0f4c81}.diagnosis-result blockquote{background:#f0f7ff;border-left:4px solid #2563eb;padding:14px 16px;border-radius:8px;margin:12px 0;font-size:14px}.diagnosis-result table{font-size:14px;width:100%}.diagnosis-result table th,.diagnosis-result table td{padding:10px 12px;text-align:left}.diagnosis-result table th{background:#f8fafc;color:#475569;font-weight:700;font-size:13px}.diagnosis-result hr{border:0;border-top:1px solid #e5e7eb;margin:16px 0}
</style>
</head>
<body>
<div class="header"><h1>📊 评估结果汇总</h1><p id="issueInfo">正在加载...</p></div>

<div id="results">
  <div class="card"><div class="empty"><div class="icon">⏳</div>正在收集评估结果...</div></div>
</div>

<div class="actions" id="actions" style="display:none">
  <button class="btn-secondary" onclick="history.back()">← 返回修改</button>
  <button class="btn-primary" onclick="showPasswordModal()">📋 下一阶段 · 生成执行策划案</button>
</div>

<!-- 密码弹窗 -->
<div class="overlay" id="pwdOverlay">
  <div class="modal">
    <h3>🔐 身份验证</h3>
    <p>请输入顾问密码以继续</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" maxlength="20">
    <div class="hint" id="pwdHint"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closePasswordModal()">取消</button>
      <button class="btn-confirm" onclick="verifyPassword()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="tt"></div>

<script>

// ===== 恢复诊断结果状态 =====
(function(){
  var u = new URL(window.location.href);
  var issue = u.searchParams.get('issue') || '';
  if (!issue) return;
  var shown = localStorage.getItem('fusionResultShown_' + issue);
  if (shown === '1') {
    // User has seen the result page before, show it directly
    document.addEventListener('DOMContentLoaded', function(){
      setTimeout(function(){
        var data = getBatchData(issue);
        if (data) {
          showDiagnosisStyleResult(true);  // skip flag: already stored
        }
      }, 300);
    });
  }
})();

// ========== 配置 ==========
var BATCH_DATA_KEY = '***';
var DEFAULT_PASSWORD = '888888';

// 国家emoji映射
var COUNTRY_EMOJI = {
  'tr':'🇹🇷','sg':'🇸🇬','au':'🇦🇺','nz':'🇳🇿',
  'us':'🇺🇸','eu':'🇪🇺','hk':'🇭🇰','dm':'🇩🇲',
  'jp':'🇯🇵','vu':'🇻🇺','ge':'🇬🇪','ca':'🇨🇦',
  'uk':'🇬🇧','gr':'🇬🇷','pt':'🇵🇹','es':'🇪🇸',
  'mt':'🇲🇹','cy':'🇨🇾','ae':'🇦🇪','th':'🇹🇭',
  'my':'🇲🇾','kn':'🇰🇳','lc':'🇱🇨','gd':'🇬🇩',
  'ag':'🇦🇬','pt':'🇵🇹','it':'🇮🇹','fr':'🇫🇷',
  'de':'🇩🇪','ch':'🇨🇭','ie':'🇮🇪'
};

// 国家中文名映射
var COUNTRY_NAMES = {
  'tr':'土耳其','sg':'新加坡','au':'澳大利亚','nz':'新西兰',
  'us':'美国','eu':'欧洲','hk':'香港','dm':'多米尼克',
  'jp':'日本','vu':'瓦努阿图','ge':'格鲁吉亚','ca':'加拿大',
  'uk':'英国','gr':'希腊','pt':'葡萄牙','es':'西班牙',
  'mt':'马耳他','cy':'塞浦路斯','ae':'阿联酋','th':'泰国',
  'my':'马来西亚','kn':'圣基茨','lc':'圣卢西亚','gd':'格林纳达',
  'ag':'安提瓜','it':'意大利','fr':'法国','de':'德国',
  'ch':'瑞士','ie':'爱尔兰'
};

// ========== 数据读取 ==========
function getBatchData(issue) {
  try {
    var raw = localStorage.getItem(BATCH_DATA_KEY);
    if (!raw) return null;
    var all = JSON.parse(raw);
    return all[issue] || null;
  } catch (e) {
    return null;
  }
}

// ========== Toast ==========
function toast(msg) {
  var t = document.getElementById('tt');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function () { t.classList.remove('show'); }, 2000);
}

// ========== 密码弹窗 ==========
function showPasswordModal() {
  document.getElementById('pwdOverlay').classList.add('show');
  document.getElementById('pwdInput').value = '';
  document.getElementById('pwdHint').textContent = '';
  setTimeout(function () {
    document.getElementById('pwdInput').focus();
  }, 100);
}

function closePasswordModal() {
  document.getElementById('pwdOverlay').classList.remove('show');
}

function verifyPassword() {
  var input = document.getElementById('pwdInput').value;
  if (input === DEFAULT_PASSWORD) {
    closePasswordModal();
    showDiagnosisStyleResult();
  } else {
    document.getElementById('pwdHint').textContent = '密码错误，请重试';
    document.getElementById('pwdHint').style.color = '#e53935';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// 回车键提交
document.addEventListener('keydown', function (e) {
  var overlay = document.getElementById('pwdOverlay');
  if (overlay.classList.contains('show') && e.key === 'Enter') {
    verifyPassword();
  }
});

// 点击遮罩关闭
document.getElementById('pwdOverlay').addEventListener('click', function (e) {
  if (e.target === this) closePasswordModal();
});

// ========== 渲染汇总 ==========
function loadResults() {
  var u = new URL(window.location.href);
  var issue = u.searchParams.get('issue') || '';

  document.getElementById('issueInfo').textContent = 'Issue #' + issue;

  var data = getBatchData(issue);

  if (!data || Object.keys(data).length === 0) {
    document.getElementById('results').innerHTML =
      '<div class="card"><div class="empty"><div class="icon">📭</div>暂无评估结果</div></div>';
    return;
  }

  var html = '';
  var hasAnySelection = false;

  Object.keys(data).forEach(function (country) {
    var info = data[country];
    var flag = COUNTRY_EMOJI[country] || '🌍';
    var name = COUNTRY_NAMES[country] || country.toUpperCase();

    var projects = extractProjects(info);

    if (projects.length === 0) return;
    hasAnySelection = true;

    html += '<div class="card">';
    html += '<h2>' + flag + ' ' + name + '</h2>';

    projects.forEach(function (p) {
      html += '<div class="project-item">';
      html += '<span class="check">✅</span>';
      html += '<div class="info">';
      html += '<div class="name">' + escapeHtml(p) + '</div>';
      html += '</div>';
      html += '</div>';
    });

    html += '</div>';
  });

  if (!hasAnySelection) {
    html = '<div class="card"><div class="empty"><div class="icon">📭</div>当前所选国家均暂无符合项目。仍可进入下一阶段，生成“暂无推荐项目”的执行策划案。</div></div>';
  }

  document.getElementById('results').innerHTML = html;
  document.getElementById('actions').style.display = 'flex';
}

// ========== 跳转执行策划案 ==========
function goToExecPlan() {
  var u = new URL(window.location.href);
  var issue = u.searchParams.get('issue') || '';
  if (!issue) { toast('未找到Issue编号'); return; }
  var data = getBatchData(issue);
  if (!data) { toast('暂无评估数据'); return; }
  var countriesArr = [];
  var projectsArr = [];
  getSelectedCountries(data).forEach(function (c) {
    var info = data[c] || {};
    var projs = extractProjects(info);
    countriesArr.push(c);
    projs.forEach(function(p){projectsArr.push(c+':'+encodeURIComponent(p))});
  });
  if (!countriesArr.length) { Object.keys(data).filter(function(k){return k.indexOf('__')!==0}).forEach(function(c){countriesArr.push(c)}); }
  var target = 'fusion.html?issue='+encodeURIComponent(issue)+'&countries='+encodeURIComponent(countriesArr.join(','))+'&projects='+encodeURIComponent(projectsArr.join('|'));
  toast('正在生成融合执行策划案...');
  setTimeout(function(){location.href=target;}, 600);
}

function showDiagnosisStyleResult(skipSave) {
  var u = new URL(window.location.href);
  var issue = u.searchParams.get('issue') || '';
  if (!issue) return;
  if (!skipSave) localStorage.setItem('fusionResultShown_' + issue, '1');
  var data = getBatchData(issue);
  if (!data) return;

  // Build diagnosis-style summary
  var countriesArr = []; var projectsArr = [];
  getSelectedCountries(data).forEach(function(c){
    var info = data[c] || {};
    var ps = extractProjects(info);
    countriesArr.push(c);
    ps.forEach(function(p){projectsArr.push(c+':'+encodeURIComponent(p))});
  });

  var html = '<div class=diagnosis-result>';
  html += '<h2 style=color:#0b2a5b;border-bottom:3px solid #2563eb;text-align:center;padding-bottom:12px>家庭全球规划 · 诊断草案</h2>';
  html += '<p style=text-align:center;color:#666;font-size:14px>编号：'+escHtml(issue)+' | '+new Date().toLocaleString('zh-CN')+'</p>';
  html += '<hr style=margin:16px 0>';

  // Section: selected countries and projects
  html += '<h3>已选国家与项目</h3>';
  html += '<table><thead><tr><th style=width:80px>国家</th><th>选中项目</th></tr></thead><tbody>';
  countriesArr.forEach(function(c){
    var cn = COUNTRY_NAMES[c] || c.toUpperCase();
    var emoji = COUNTRY_EMOJI[c] || '';
    var info = data[c] || {};
    var ps = extractProjects(info);
    html += '<tr><td>'+emoji+' '+cn+'</td><td>'+(ps.length?ps.map(escHtml).join('、'):'<i>暂无用户勾选项目，保留国家上下文</i>')+'</td></tr>';
  });
  html += '</tbody></table>';

  // Section: key findings
  html += '<h3 style=margin-top:24px>根本判断</h3>';
  html += '<blockquote>本次融合方案涉及 <b>'+countriesArr.length+'</b> 个国家/地区、<b>'+projectsArr.length+'</b> 个身份项目。核心策略：将身份工具（各国项目）、资金路径、税务边界和家庭目标组合成可执行、可解释、可回退的融合方案。</blockquote>';

  // Section: next steps
  html += '<h3 style=margin-top:24px>立即行动清单</h3>';
  html += '<table><thead><tr><th style=width:40px>#</th><th>动作</th><th style=width:80px>时间</th></tr></thead><tbody>';
  html += '<tr><td>1</td><td>确认客户资金来源与资金出境路径</td><td>本周</td></tr>';
  html += '<tr><td>2</td><td>确认家庭成员年龄结构与随行需求</td><td>本周</td></tr>';
  html += '<tr><td>3</td><td>联系各国持牌律师获取最新政策报价</td><td>1-3月</td></tr>';
  html += '<tr><td>4</td><td>启动合规清理（银行KYB/资金来源/完税证明）</td><td>1-3月</td></tr>';
  html += '<tr><td>5</td><td>按下方「融合执行策划案」制定分步执行计划</td><td>6-12月</td></tr>';
  html += '</tbody></table>';

  // Risk reminder
  html += '<h3 style=margin-top:24px>⚠️ 重要提醒</h3>';
  html += '<blockquote style=background:#fff3cd;border-left-color:#f59e0b>';
  html += '<p>1. <b>第三国护照边界</b>：仅限金融税务规划用途，严禁用于中国出入境。</p>';
  html += '<p>2. <b>本结果不构成法律建议</b>：最终方案须经目标国持牌专业人士确认。</p>';
  html += '<p>3. <b>政策时效性</b>：各国移民政策持续变动，执行前须完成最新核验。</p>';
  html += '</blockquote>';

  // Buttons: view exec plan + return to diagnosis draft
  var diagUrl = 'document.html?issue=' + encodeURIComponent(issue);
  html += '<div class="toolbar">';
  html += '<button class="btn primary" onclick="goToExecPlan()">📋 查看执行策划案</button>';
  html += '<button class="btn secondary" onclick="location.href=\'' + diagUrl + '\'">← 返回上一阶段</button>';
  html += '</div>';
  html += '<div class="toolbar">';
  html += '<button class="btn secondary" onclick="location.reload()">🔄 刷新执行策划案</button>';
  html += '</div>';
  html += '<p style="text-align:center;color:#888;font-size:12px;margin-top:8px">执行策划案生成约需30分钟，可关闭页面稍后重新打开本链接查看。</p>';
  html += '</div>';
  html += '</div>';

  // Replace summary content with diagnosis result
  var resultsDiv = document.getElementById('results');
  document.getElementById('actions').style.display = 'none';
  // Create or reuse diagnosis result container
  var dr = document.getElementById('diagnosisResult');
  if (!dr) {
    dr = document.createElement('div');
    dr.id = 'diagnosisResult';
    dr.className = 'wrap';
    resultsDiv.parentNode.insertBefore(dr, resultsDiv);
  }
  resultsDiv.style.display = 'none';
  var heroHtml = '<div class="hero"><h1>家庭全球规划 · 执行策划案</h1><p id="sub">Issue #' + escHtml(issue) + '</p></div>';
  dr.innerHTML = heroHtml + '<div class="doc">' + html + '</div>';
  dr.style.display = 'block';
  dr.scrollIntoView({behavior:'smooth'});
}

function escHtml(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getSelectedCountries(data){
  if(!data)return[];
  if(Array.isArray(data.__selectedCountries))return data.__selectedCountries.slice();
  return Object.keys(data).filter(function(k){return k.indexOf('__')!==0});
}
// ========== 工具函数 ==========
function extractProjects(info) {
  if (!info || !Array.isArray(info.projects)) return [];
  var seen = {};
  return info.projects.filter(function (p) {
    p = String(p || '').trim();
    if (!p || seen[p]) return false;
    seen[p] = true;
    return true;
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 启动 ==========
window.addEventListener('load', loadResults);
</script>
<!-- deploy-v12-final-exec-html -->
</body>
</html>
