<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>财税方案全流程图</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f6f8fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;padding:16px;line-height:1.55}h1{text-align:center;font-size:22px;margin:8px 0 4px;color:#123a73}.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:16px}.wrap{max-width:980px;margin:0 auto;background:#fff;border-radius:18px;padding:18px;box-shadow:0 8px 28px rgba(15,23,42,.08);overflow:hidden}svg{display:block;width:100%;height:auto}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;justify-content:center}.tag{font-size:12px;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1d4ed8}.note{font-size:13px;color:#64748b;margin-top:14px;text-align:center}@media(max-width:560px){body{padding:10px}.wrap{padding:10px;border-radius:14px}h1{font-size:19px}.legend{justify-content:flex-start}.tag{font-size:11.5px}}
</style>
</head>
<body>
<h1>财税方案 · 快速问卷到执行案全流程</h1>
<div class="sub">最终确认版：主入口问卷 → 自动提交 → 诊断草案 → 国家评估 → 执行策划案</div>
<div class="wrap">
<svg viewBox="0 0 980 1220" role="img" aria-label="财税方案全流程图">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
<style>
.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.start{fill:#eff6ff;stroke:#2563eb}.process{fill:#f8fafc;stroke:#64748b}.ok{fill:#ecfdf5;stroke:#16a34a}.risk{fill:#fff7ed;stroke:#f97316}.final{fill:#f5f3ff;stroke:#7c3aed}.title{font:700 22px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;fill:#0f172a}.text{font:15px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;fill:#334155}.small{font:13px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;fill:#64748b}.num{font:700 15px -apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;fill:#fff}.line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:2;fill:none;stroke-dasharray:6 6;marker-end:url(#arrow)}
</style>
</defs>

<rect x="32" y="28" width="916" height="84" class="start" rx="20"/>
<circle cx="78" cy="70" r="22" fill="#2563eb"/><text x="73" y="76" class="num">1</text>
<text x="118" y="62" class="title">用户发送“财税方案”</text>
<text x="118" y="88" class="text">Agent 只发送最终版手机问卷链接，不自动进入诊断</text>

<path d="M490 112 V158" class="line"/>

<rect x="32" y="158" width="916" height="116" class="process" rx="20"/>
<circle cx="78" cy="216" r="22" fill="#64748b"/><text x="73" y="222" class="num">2</text>
<text x="118" y="198" class="title">填写最终版快速问卷</text>
<text x="118" y="224" class="text">入口：family-plan/?v=20260609-final</text>
<text x="118" y="250" class="small">资产结构选择“房产”后展开：房产数量 → 每套估值；其他资产也联动展开</text>

<path d="M490 274 V320" class="line"/>

<rect x="32" y="320" width="916" height="118" class="ok" rx="20"/>
<circle cx="78" cy="379" r="22" fill="#16a34a"/><text x="73" y="385" class="num">3</text>
<text x="118" y="360" class="title">提交问卷</text>
<text x="118" y="386" class="text">优先提交到系统 / GitHub Issue，记录 issue 编号</text>
<text x="118" y="412" class="small">失败兜底：展示可复制文本；文本含识别协议，其他城市 Agent 也能进入 Step 2</text>

<path d="M490 438 V484" class="line"/>

<rect x="32" y="484" width="916" height="126" class="process" rx="20"/>
<circle cx="78" cy="547" r="22" fill="#64748b"/><text x="73" y="553" class="num">4</text>
<text x="118" y="524" class="title">自动生成诊断草案</text>
<text x="118" y="550" class="text">Agent 读取 ≤3 个相关知识库 + 2-3 次最新政策检索</text>
<text x="118" y="576" class="small">输出手机优先版 Markdown：8大板块、财税维度、方案 A/B/C/D、待确认事项</text>

<path d="M490 610 V656" class="line"/>

<rect x="32" y="656" width="916" height="116" class="ok" rx="20"/>
<circle cx="78" cy="714" r="22" fill="#16a34a"/><text x="73" y="720" class="num">5</text>
<text x="118" y="696" class="title">用户查看诊断草案页</text>
<text x="118" y="722" class="text">页面自动适配手机：短段落、自动换行、表格不撑屏</text>
<text x="118" y="748" class="small">点击“进入下一阶段”选择方案和国家组合</text>

<path d="M490 772 V818" class="line"/>

<rect x="32" y="818" width="916" height="116" class="process" rx="20"/>
<circle cx="78" cy="876" r="22" fill="#64748b"/><text x="73" y="882" class="num">6</text>
<text x="118" y="858" class="title">逐国评估</text>
<text x="118" y="884" class="text">系统按所选国家进入评估页；0项目国家自动跳过</text>
<text x="118" y="910" class="small">通过项目保存到 batchData；无项目保存空数组，继续下个国家</text>

<path d="M490 934 V980" class="line"/>

<rect x="32" y="980" width="916" height="94" class="risk" rx="20"/>
<circle cx="78" cy="1027" r="22" fill="#f97316"/><text x="73" y="1033" class="num">7</text>
<text x="118" y="1018" class="title">批量汇总页</text>
<text x="118" y="1044" class="text">只显示有选中项目的国家；空国家自动略过</text>

<path d="M490 1074 V1120" class="line"/>

<rect x="32" y="1120" width="916" height="76" class="final" rx="20"/>
<circle cx="78" cy="1158" r="22" fill="#7c3aed"/><text x="73" y="1164" class="num">8</text>
<text x="118" y="1150" class="title">生成减法版执行策划案 + 佣金明细</text>
<text x="118" y="1176" class="text">密码 888888；费用/周期/佣金/问题分析只渲染选中项目</text>
</svg>
<div class="legend">
<span class="tag">蓝色：入口</span><span class="tag">绿色：用户可见结果</span><span class="tag">橙色：筛选/汇总</span><span class="tag">紫色：最终交付</span>
</div>
<div class="note">核心原则：客户手机能填、能看、能进入下一步；Agent 不重复发问卷，直接按问卷生成诊断草案。</div>
</div>
</body>
</html>
