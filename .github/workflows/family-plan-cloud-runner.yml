name: Family Plan Cloud Runner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "diagnosis"
        type: choice
        options:
          - diagnosis
          - execution
          - all
      issue_number:
        description: "Optional issue number to process"
        required: false
        default: ""
  issues:
    types: [opened, labeled, edited]
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: family-plan-cloud-runner-${{ github.event.inputs.issue_number || github.event.issue.number || 'scheduled' }}
  cancel-in-progress: false

jobs:
  cloud-runner:
    runs-on: ubuntu-latest
    if: github.event_name != 'issues' || contains(github.event.issue.labels.*.name, 'pending') || contains(github.event.issue.labels.*.name, 'questionnaire') || contains(github.event.issue.labels.*.name, 'execution-request')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4

      - name: Validate cloud runner sync
        run: |
          python scripts/cloud-runner/validate_cloud_sync.py

      - name: Run cloud diagnosis/execution worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://us.aitechflux.com/v1
          OPENAI_MODEL: aitechflux/gpt-5.5
          OPENAI_FALLBACK_MODELS: deepseek-chat
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: https://www.primerouter.xyz
          ANTHROPIC_MODEL: claude-opus-4-8
          OPUS_BREAKER_THRESHOLD: "1"
          DIAG_MAX_PROBLEMS: "6"
        run: |
          python scripts/cloud-runner/family_plan_cloud_runner.py
