name: Family Plan Cloud Smoke Test

on:
  push:
    paths:
      - 'cloud-requests/**'
      - '.github/workflows/family-plan-cloud-smoke-test.yml'
      - 'scripts/cloud-runner/**'

permissions:
  contents: write

concurrency:
  group: family-plan-cloud-smoke-test
  cancel-in-progress: false

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4
      - name: Validate cloud runner sync
        run: |
          python scripts/cloud-runner/validate_cloud_sync.py
      - name: Run random 3-country smoke test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://us.aitechflux.com/v1
          OPENAI_MODEL: aitechflux/gpt-5.5
        run: |
          mkdir -p cloud-runs/logs
          REQ=$(ls -t cloud-requests/random3-*.txt | head -1)
          RUN_ID=$(basename "$REQ" .txt)
          echo "Using request: $REQ / $RUN_ID" | tee cloud-runs/logs/${RUN_ID}.log
          set +e
          python scripts/cloud-runner/diagnosis_template_renderer.py "$REQ" --output "cloud-runs/${RUN_ID}-diagnosis.html" >> cloud-runs/logs/${RUN_ID}.log 2>&1
          DIAG_CODE=$?
          python scripts/cloud-runner/v21_fusion_renderer.py "$REQ" 3003 --output "cloud-runs/${RUN_ID}-execution.html" >> cloud-runs/logs/${RUN_ID}.log 2>&1
          EXEC_CODE=$?
          rm -rf cloud-runs/project-modules-3003
          if [ -d cloud-output/project-modules-3003 ]; then cp -a cloud-output/project-modules-3003 cloud-runs/project-modules-3003; fi
          python scripts/v21_release_gate.py "cloud-runs/${RUN_ID}-execution.html" > cloud-runs/logs/${RUN_ID}-release-gate.txt 2>&1
          GATE_CODE=$?
          python - <<'PY' > cloud-runs/logs/random3-visible-gate.txt 2>&1
          from pathlib import Path
          from bs4 import BeautifulSoup
          paths=[Path(p) for p in Path('cloud-runs').glob('random3-*-*.html')]
          paths += sorted(Path('cloud-runs/project-modules-3003').glob('*.html')) if Path('cloud-runs/project-modules-3003').exists() else []
          for p in paths:
              s=p.read_text(encoding='utf-8',errors='replace')
              text=BeautifulSoup(s,'html.parser').get_text('\n',strip=True)
              bad=[x for x in ['�','TODO','Lorem','placeholder','思考过程','内部过程','作为AI','云端执行器','工作底稿','结构预览','fallback'] if x in s or x in text]
              print(p, p.stat().st_size, len(text), s.lower().count('<table'), s.lower().count('<svg'), s.lower().count('<img'), bad)
              assert not bad
          print('CLOUD_SMOKE_VISIBLE_GATE=PASS')
          PY
          VISIBLE_CODE=$?
          echo "DIAG_CODE=$DIAG_CODE EXEC_CODE=$EXEC_CODE GATE_CODE=$GATE_CODE VISIBLE_CODE=$VISIBLE_CODE" | tee -a cloud-runs/logs/${RUN_ID}.log
          if [ "$DIAG_CODE$EXEC_CODE$GATE_CODE$VISIBLE_CODE" != "0000" ]; then
            echo "Cloud smoke failed; logs will be committed by next step" | tee -a cloud-runs/logs/${RUN_ID}.log
            exit 0
          fi
      - name: Commit smoke test outputs
        if: always()
        run: |
          git config user.name "family-plan-cloud-runner"
          git config user.email "actions@users.noreply.github.com"
          git add cloud-runs
          if git diff --cached --quiet; then
            echo "No output changes"
          else
            git commit -m "Add cloud random3 smoke test outputs"
            git push
          fi
