<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>瓦努阿图发展支持计划(VDSP)资格评估</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f6f8;color:#1a1a1a;line-height:1.6;-webkit-text-size-adjust:100%}
.container{max-width:720px;margin:0 auto;padding:0 0 40px}
.header{background:linear-gradient(135deg,#004d40,#00695c);color:#fff;padding:32px 20px 28px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:22px;margin-bottom:4px}
.header p{opacity:.85;font-size:13px}
.card{background:#fff;border-radius:14px;padding:24px 18px;margin:16px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:17px;color:#00695c;margin-bottom:16px;padding-bottom:10px;border-bottom:1.5px solid #eef1f5;display:flex;align-items:center;gap:8px}
.card h2 .num{background:#00695c;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fg{margin-bottom:16px}
.fg label.q{display:block;font-weight:600;font-size:14px;margin-bottom:5px;color:#333}
.fg .hint{font-size:12px;color:#999;margin-bottom:4px;font-weight:400}
.fg select,.fg input[type=text]{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;transition:border .2s;background:#fafafa;-webkit-appearance:none}
.fg select:focus,.fg input:focus{outline:none;border-color:#26a69a;background:#fff}
.detail-input{margin-top:8px;display:none}
.detail-input.show{display:block}
.detail-input input{width:100%;padding:10px 12px;border:1.5px solid #b2dfdb;border-radius:8px;font-size:14px;background:#f0fdfa}
.detail-input input::placeholder{color:#999}
.detail-input .label-sm{font-size:12px;color:#666;margin-bottom:4px;display:block}
.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.radio-row .ropt{flex:1;min-width:80px;padding:10px 16px;border:1.5px solid #ddd;border-radius:8px;text-align:center;cursor:pointer;font-size:14px;background:#fafafa;transition:all .15s;user-select:none}
.radio-row .ropt:active,.radio-row .ropt.sel{border-color:#26a69a;background:#f0fdfa;font-weight:600;color:#00695c}
.radio-row input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
.btn{display:block;width:calc(100% - 24px);margin:20px auto;padding:14px;background:linear-gradient(135deg,#004d40,#00695c);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{transform:scale(.98)}

.results-wrap{display:none;margin:0 12px}
.results-wrap.show{display:block}
.rs-card{background:#fff;border-radius:14px;padding:20px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.rs-card h3{font-size:18px;margin-bottom:6px;color:#00695c}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:3px}
.tg{background:#dcfce7;color:#166534}
.ty{background:#fef3c7;color:#92400e}
.tr{background:#fee2e2;color:#991b1b}
.prog{background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:10px}
.prog.el{border-left:4px solid #22c55e}
.prog.mb{border-left:4px solid #f59e0b}
.prog.no{border-left:4px solid #e0e0e0;opacity:.85}
.prog h4{font-size:15px;margin-bottom:6px;color:#00695c}
.prog .st{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:6px}
.st-q{background:#dcfce7;color:#166534}.st-m{background:#fef3c7;color:#92400e}.st-n{background:#fee2e2;color:#991b1b}
.prog .d{font-size:13px;color:#555;line-height:1.7}
.g{color:#166534;font-weight:600}.o{color:#c2410c;font-weight:600}
table.cm{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
table.cm th,table.cm td{border:1px solid #e2e8f0;padding:7px;text-align:center}
table.cm th{background:#f1f5f9;font-weight:600;font-size:11px}
table.cm td:first-child{text-align:left;font-weight:500}
.hb{background:#fef5f5;border:1px solid #f5c6c6;border-radius:8px;padding:12px;margin:10px 0;font-size:13px}
.hb.g{background:#f0fdf4;border-color:#bbf7d0}
.hb.w{background:#fff7ed;border-color:#fed7aa}
.btn-sm{display:inline-block;padding:10px 20px;margin:4px 0;background:#eef1f5;color:#555;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:#26a69a;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Investment path cards */
.path-cards{display:flex;flex-direction:column;gap:10px}
.path-card{border:2px solid #e5e7eb;border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;background:#fafafa}
.path-card:hover{border-color:#26a69a}
.path-card.sel{border-color:#26a69a;background:#f0fdfa}
.path-card .path-t{font-weight:700;font-size:14px;color:#333;margin-bottom:3px}
.path-card .path-p{font-size:12px;color:#666}
.path-card .path-badge{float:right;font-size:10px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:10px;font-weight:600}

@media(max-width:400px){.radio-row .ropt{min-width:60px;padding:8px 12px;font-size:13px}.card{padding:18px 14px;margin:10px 8px}.header h1{font-size:19px}}

.flow-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.flow-actions button{flex:1;min-width:120px;border:0;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer}.flow-primary{background:linear-gradient(135deg,#004d40,#00695c);color:#fff}.flow-secondary{background:#eef1f5;color:#555}.choice-grid{display:grid;gap:10px}.choice-card{border:2px solid #e5e7eb;border-radius:12px;padding:13px;background:#fafafa;cursor:pointer}.choice-card.sel{border-color:#26a69a;background:#f0fdfa}.choice-card h4{font-size:15px;color:#00695c;margin-bottom:4px}.choice-card p{font-size:12px;color:#666}.project-list{display:none;margin-top:12px}.project-list.show{display:block}.project-opt{border:1.5px solid #e5e7eb;border-radius:10px;padding:11px;margin-bottom:8px;background:#fff;cursor:pointer}.project-opt.sel{border-color:#22c55e;background:#f0fdf4}.stage-hint{font-size:12px;color:#888;margin-top:6px}
.project-check-grid{display:flex;flex-direction:column;gap:8px;margin:10px 0}.project-check{display:flex;align-items:flex-start;gap:8px;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fafafa;cursor:pointer;font-size:13px;line-height:1.5;transition:all .15s}.project-check:has(input:checked){border-color:#22c55e;background:#f0fdf4}.project-check input[type=checkbox]{margin-top:2px;accent-color:#22c55e;width:16px;height:16px;flex-shrink:0}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🇻🇺 瓦努阿图发展支持计划(VDSP)资格评估</h1><p>Vanuatu DSP · 2026政策 · 全球最快护照 · 约3分钟</p></div>

<form id="qform">

<div class="card"><h2><span class="num">1</span> 基本信息</h2>
<div class="fg"><label class="q">年龄</label><select id="age"><option value="">请选择</option><option value="18-30">18-30岁</option><option value="31-40">31-40岁</option><option value="41-50">41-50岁</option><option value="51-60">51-60岁</option><option value="60+">60岁及以上</option></select></div>
<div class="fg"><label class="q">当前国籍<span class="hint">（VDSP对所有国籍开放，无限制）</span></label><select id="nationality"><option value="">请选择</option><option value="cn">中国内地</option><option value="cn-hkmo">中国香港/澳门</option><option value="cn-tw">中国台湾</option><option value="ru">俄罗斯</option><option value="ir">伊朗</option><option value="other-asia">其他亚洲国家</option><option value="eu">欧洲国家</option><option value="me">中东/北非</option><option value="other">其他</option></select></div>
<div class="fg"><label class="q">是否有无犯罪记录<span class="hint">（选择"是"表示无犯罪记录；VDSP要求提供无犯罪记录证明）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="nocrim" value="yes"> 是</label><label class="ropt"><input type="radio" name="nocrim" value="no"> 否</label></div></div>
<div class="fg"><label class="q">健康状况<span class="hint">（需提供基础健康证明，无重大传染病）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="health" value="good"> 良好</label><label class="ropt"><input type="radio" name="health" value="issue"> 有需要说明的情况</label></div></div>
</div>

<div class="card"><h2><span class="num">2</span> 资产与资金能力</h2>
<div class="fg"><label class="q">个人/家庭可投资净资产<span class="hint">（美元，含现金、房产、股票等）</span></label><select id="networth"><option value="">请选择</option><option value="lt130k">低于$13万（约¥95万）</option><option value="130k-300k">$13万-$30万（约¥95万-¥219万）</option><option value="300k-1m">$30万-$100万（约¥219万-¥730万）</option><option value="gte1m">$100万及以上（约¥730万+）</option></select></div>
<div class="fg"><label class="q">投资金额预算<span class="hint">（VDSP为一次性捐款制，不可退还）</span></label><select id="budget"><option value="">请选择</option><option value="single">单人$130,000（ALL-IN $135,500）</option><option value="couple">夫妻$150,000（ALL-IN约$156,000）</option><option value="family4">四口家庭$180,000（ALL-IN约$187,000）</option><option value="family-big">大家庭（含父母随行）$180,000+</option><option value="unsure">不确定，需顾问评估</option></select></div>
<div class="fg"><label class="q">投资资金来源是否可合法解释？<span class="hint">（VDSP对资金来源审查相对宽松，但建议可说明）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="fundsource" value="yes"> 是，可提供</label><label class="ropt"><input type="radio" name="fundsource" value="partial"> 部分可提供</label><label class="ropt"><input type="radio" name="fundsource" value="no"> 难以提供</label></div></div>
</div>

<div class="card"><h2><span class="num">3</span> 家庭情况</h2>
<div class="fg"><label class="q">婚姻状况</label><select id="marital"><option value="">请选择</option><option value="single">单身</option><option value="married">已婚</option><option value="divorced">离异</option></select></div>
<div class="fg"><label class="q">是否有18岁以下子女？<span class="hint">（配偶及18岁以下子女可随行一同获得护照）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="haschild" value="yes"> 是</label><label class="ropt"><input type="radio" name="haschild" value="no"> 否</label></div>
<div id="dt-child" class="detail-input"><span class="label-sm">18岁以下子女人数及年龄：</span><input type="text" id="child-info" placeholder="例如：2个，8岁和5岁"></div></div>
<div class="fg"><label class="q">是否有18岁以上子女需要安排？</label><div class="radio-row"><label class="ropt"><input type="radio" name="adultchild" value="yes"> 是</label><label class="ropt"><input type="radio" name="adultchild" value="no"> 否</label></div>
<div id="dt-adultchild" class="detail-input"><span class="label-sm">成年子女年龄及情况：</span><input type="text" id="adultchild-info" placeholder="例如：22岁在读大学（18+子女一般不可随行）"></div></div>
<div class="fg"><label class="q">是否有60岁以上父母需要随行？<span class="hint">（VDSP允许60岁以上父母随行，需额外捐款$15,000/人）</span></label><div class="radio-row"><label class="ropt"><input type="radio" name="hasparent" value="yes"> 是</label><label class="ropt"><input type="radio" name="hasparent" value="no"> 否</label></div>
<div id="dt-parent" class="detail-input"><span class="label-sm">父母年龄及人数：</span><input type="text" id="parent-info" placeholder="例如：母亲65岁，父亲68岁"></div></div>
</div>

<div class="card"><h2><span class="num">4</span> 核心目的<span class="hint" style="font-weight:400;font-size:12px">（可多选）</span></h2>
<div class="fg">
<div class="radio-row">
<label class="ropt"><input type="checkbox" name="purpose" value="passport"> 📘 第二护照</label>
<label class="ropt"><input type="checkbox" name="purpose" value="asset"> 🏦 资产保护</label>
<label class="ropt"><input type="checkbox" name="purpose" value="e2"> 🇺🇸 E-2赴美跳板</label>
</div>
</div>
<div class="fg">
<div class="radio-row">
<label class="ropt"><input type="checkbox" name="purpose" value="tax"> 💰 税务规划</label>
<label class="ropt"><input type="checkbox" name="purpose" value="travel"> ✈️ 全球免签出行</label>
<label class="ropt"><input type="checkbox" name="purpose" value="other"> 📋 其他</label>
</div>
</div>
<div class="fg" id="dt-purpose-other" style="display:none"><span class="label-sm">请简述其他目的：</span><input type="text" id="purpose-other-info" placeholder="例如：子女海外教育、离岸架构等"></div>
<div class="fg"><label class="q">时间紧迫程度</label><select id="urgency"><option value="">请选择</option><option value="urgent">非常紧急（希望3个月内完成）</option><option value="normal">一般（3-6个月可接受）</option><option value="flexible">灵活（6个月以上也可以）</option></select></div>
</div>

<div class="card"><h2><span class="num">5</span> 其他考虑因素</h2>
<div class="fg"><label class="q">是否同时申请其他国家的移民项目？</label><div class="radio-row"><label class="ropt"><input type="radio" name="concurrent" value="yes"> 是</label><label class="ropt"><input type="radio" name="concurrent" value="no"> 否</label></div>
<div id="dt-concurrent" class="detail-input"><span class="label-sm">请说明同时申请的国家及项目：</span><input type="text" id="concurrent-info" placeholder="例如：土耳其CBI、格林纳达CBI"></div></div>
<div class="fg"><label class="q">对双重国籍的态度</label><div class="radio-row"><label class="ropt"><input type="radio" name="dualcitizen" value="ok"> 可接受不主动申报</label><label class="ropt"><input type="radio" name="dualcitizen" value="concern"> 有顾虑，需评估</label></div></div>
<div class="fg"><label class="q">是否有特殊关注事项？<span class="hint">（如税务规划、离岸银行开户、CRS等）</span></label><input type="text" id="concerns" placeholder="请简述（可选）"></div>
</div>

<button type="button" class="btn" onclick="submitForm()">📊 提交评估</button>
</form>

<div class="results-wrap" id="results"></div>
</div>

<script>
(function(){
  var D=document;
  function R(name){var e=D.querySelector('input[name="'+name+'"]:checked');return e?e.value:null;}
  function S(id){var e=D.getElementById(id);return e?e.value:'';}
  function I(id){var e=D.getElementById(id);return e?e.value.trim():'';}
  function Y(v){return v==='yes'?'是':v==='no'?'否':(v||'未填');}
  function CB(name){var es=D.querySelectorAll('input[name="'+name+'"]:checked'),a=[];es.forEach(function(e){a.push(e.value);});return a;}

  // Radio selection
  function selectOption(label){
    var input=label.querySelector('input');
    if(!input)return;
    if(input.type==='radio'){
      input.checked=true;
      var row=label.closest('.radio-row');
      if(row)row.querySelectorAll('.ropt').forEach(function(l){l.classList.remove('sel');});
      label.classList.add('sel');
      onChange(input.name,input.value);
    }else if(input.type==='checkbox'){
      input.checked=!input.checked;
      label.classList.toggle('sel',input.checked);
      if(input.name==='purpose'&&input.value==='other')D.getElementById('dt-purpose-other').style.display=input.checked?'block':'none';
    }
  }
  D.querySelectorAll('.radio-row .ropt').forEach(function(label){
    label.setAttribute('tabindex','0');
    label.addEventListener('touchstart',function(e){selectOption(this);e.preventDefault();}, {passive:false});
    label.addEventListener('mousedown',function(e){selectOption(this);e.preventDefault();});
    label.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){selectOption(this);e.preventDefault();}});
  });

  window.goBack=function(){var D=document;D.getElementById("results").classList.remove("show");D.getElementById("qform").style.display="";setTimeout(function(){D.getElementById("qform").scrollIntoView({behavior:"smooth"});},50);};window.onProjectCheck=function(){};
window.goExecPlan=function(){
  var checks=document.querySelectorAll('input[name="selProject"]:checked');
  if(checks.length===0){var uu=new URL(window.location.href);var bb=uu.searchParams.get('batch')||'';if(bb==='1'){var ii=uu.searchParams.get('issue')||'';if(ii){try{var bd=JSON.parse(localStorage.getItem('***')||'{}');bd[ii]=bd[ii]||{};bd[ii]['vu']={projects:[],ts:Date.now()};localStorage.setItem('***',JSON.stringify(bd));}catch(e){}}var rurl=uu.searchParams.get('return')||'https://sewen38.github.io/family-plan/?batch=1&issue='+ii;window.location.href=rurl;return;}else{alert('该国家暂无符合的项目，可返回上一页重新选择国家');return;}}
  var projects=Array.from(checks).map(function(c){return c.value;});
  var u=new URL(window.location.href);
  var batch=u.searchParams.get('batch')||'';
  var issue=u.searchParams.get('issue')||'';
  if(batch==='1'&&issue){
    try{var bd=JSON.parse(localStorage.getItem('***')||'{}');bd[issue]=bd[issue]||{};bd[issue]['vu']={projects:projects,ts:Date.now()};localStorage.setItem('***',JSON.stringify(bd));}catch(e){}
    var retUrl=u.searchParams.get('return')||'https://sewen38.github.io/family-plan/?batch=1&issue='+issue;
    window.location.href=retUrl;return;
  }
  window.location.href='https://sewen38.github.io/family-plan/exec.html?issue='+issue+'&countries=vu&projects='+projects.map(function(p){return 'vu:'+encodeURIComponent(p)}).join('|');
};window.goPrevStage=function(){
  var u=new URL(window.location.href);
  var ret=u.searchParams.get('return')||'';
  if(ret){window.location.href=ret;return;}
  window.location.href='https://sewen38.github.io/family-plan/?issue='+(u.searchParams.get('issue')||'');
};

  function onChange(n,v){
    if(n==='haschild')D.getElementById('dt-child').classList.toggle('show',v==='yes');
    if(n==='adultchild')D.getElementById('dt-adultchild').classList.toggle('show',v==='yes');
    if(n==='hasparent')D.getElementById('dt-parent').classList.toggle('show',v==='yes');
    if(n==='concurrent')D.getElementById('dt-concurrent').classList.toggle('show',v==='yes');
  }

  D.querySelectorAll('input[name="haschild"]').forEach(function(r){r.addEventListener('change',function(){onChange('haschild',this.value);});});
  D.querySelectorAll('input[name="adultchild"]').forEach(function(r){r.addEventListener('change',function(){onChange('adultchild',this.value);});});
  D.querySelectorAll('input[name="hasparent"]').forEach(function(r){r.addEventListener('change',function(){onChange('hasparent',this.value);});});
  D.querySelectorAll('input[name="concurrent"]').forEach(function(r){r.addEventListener('change',function(){onChange('concurrent',this.value);});});

  window.submitForm=function(){
    var age=S('age'),nat=S('nationality'),nocrim=R('nocrim'),health=R('health'),networth=S('networth'),budget=S('budget'),fundsource=R('fundsource'),marital=S('marital'),haschild=R('haschild'),adultchild=R('adultchild'),hasparent=R('hasparent'),urgency=S('urgency'),concurrent=R('concurrent'),dualcitizen=R('dualcitizen');
    if(!age||!nat||!nocrim||!health||!networth||!budget||!fundsource||!marital||!haschild||!adultchild||!hasparent||!urgency||!concurrent||!dualcitizen){var m=[];if(!age)m.push('年龄');if(!nat)m.push('当前国籍');if(!nocrim)m.push('犯罪记录');if(!health)m.push('健康状况');if(!networth)m.push('净资产');if(!budget)m.push('投资预算');if(!fundsource)m.push('资金来源');if(!marital)m.push('婚姻状况');if(!haschild)m.push('是否有子女');if(!adultchild)m.push('成年子女');if(!hasparent)m.push('父母随行');if(!urgency)m.push('时间紧迫度');if(!concurrent)m.push('是否有其他申请');if(!dualcitizen)m.push('双重国籍态度');alert('请完成：\n'+m.join('、'));return;}

    var w=D.getElementById('results');
    D.getElementById('qform').style.display='none';
    w.innerHTML='<div class="rs-card" style="text-align:center;padding:50px 20px"><div style="font-size:40px">📤</div><h3>已提交</h3><p style="color:#888;font-size:13px;margin:6px 0"><span class="spinner"></span>正在分析评估...</p></div>';
    w.classList.add('show');w.scrollIntoView({behavior:'smooth'});

    var L_age={'18-30':'18-30岁','31-40':'31-40岁','41-50':'41-50岁','51-60':'51-60岁','60+':'60岁及以上'}

      h+='<div class="rs-card"><p style="color:#888;text-align:center;padding:20px">⚠️ 暂未匹配到完全符合条件的项目。</p>';
      h+='<div class="flow-actions"><button class="flow-secondary" onclick="goPrevStage()">返回上一阶段</button><button class="flow-secondary" onclick="goBack()">返回修改问卷</button>';
      var bu=new URL(window.location.href); if(bu.searchParams.get('batch')==='1') h+='<button class="flow-primary" style="background:#d97706" onclick="goExecPlan()">下一阶段（跳过该国）</button>';
      h+='</div></div>';
    }

    D.getElementById('results').innerHTML=h;
  }
})();
</script>
</body>
</html>
