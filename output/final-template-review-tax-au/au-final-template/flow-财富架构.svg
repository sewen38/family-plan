<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" font-family="-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#006400"/><stop offset="100%" stop-color="#1a8a1a"/></linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e40af"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="niv" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5a623"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="tech" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
    <linearGradient id="emp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="pr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#006400"/><stop offset="100%" stop-color="#2d8a2d"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <rect width="760" height="620" rx="16" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Node 1: 中国 -->
  <rect x="180" y="20" width="400" height="55" rx="12" fill="url(#top)" filter="url(#shadow)"/>
  <text x="380" y="44" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🏢 中国事业主体 / 家庭资产</text>
  <text x="380" y="63" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="11">事业国 · 赚钱地</text>

  <defs><marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#006400"/></marker></defs>
  <defs><marker id="arrowB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#1e40af"/></marker></defs>
  <defs><marker id="arrowO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#f5a623"/></marker></defs>

  <!-- Arrow 1 -->
  <line x1="380" y1="75" x2="380" y2="112" stroke="#006400" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <rect x="395" y="82" width="130" height="24" rx="6" fill="#dcfce7"/>
  <text x="460" y="99" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">↓ 合规资金/资质</text>

  <!-- Node 2: 离岸保护层 -->
  <rect x="130" y="118" width="500" height="62" rx="12" fill="url(#mid)" filter="url(#shadow)"/>
  <text x="380" y="144" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🛡️ 离岸平台：香港 / 新加坡 账户或控股平台</text>
  <text x="380" y="162" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">管钱地 · 资金归集 · 境外资产管理 · 合规汇款</text>
  <text x="380" y="176" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">ODI / 37号文 / 合规换汇 / 境外存量</text>

  <!-- Arrow 2 splits -->
  <line x1="380" y1="180" x2="380" y2="210" stroke="#1e40af" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="80" y1="210" x2="680" y2="210" stroke="#1e40af" stroke-width="2"/>

  <!-- Elite talent -->
  <line x1="200" y1="210" x2="200" y2="240" stroke="#f5a623" stroke-width="2.5" marker-end="url(#arrowO)"/>
  <rect x="170" y="205" width="60" height="18" rx="5" fill="#fef3c7"/>
  <text x="200" y="218" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">精英才能</text>

  <!-- Tech skills -->
  <line x1="380" y1="210" x2="380" y2="240" stroke="#0d9488" stroke-width="2.5"/>
  <rect x="350" y="205" width="60" height="18" rx="5" fill="#ccfbf1"/>
  <text x="380" y="218" text-anchor="middle" fill="#0f766e" font-size="9" font-weight="600">技术移民</text>

  <!-- Employer -->
  <line x1="560" y1="210" x2="560" y2="240" stroke="#7c3aed" stroke-width="2.5"/>
  <rect x="530" y="205" width="60" height="18" rx="5" fill="#ede9fe"/>
  <text x="560" y="218" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">雇主担保</text>

  <!-- NIV -->
  <rect x="60" y="245" width="280" height="65" rx="10" fill="url(#niv)" filter="url(#shadow)"/>
  <text x="200" y="269" text-anchor="middle" fill="#7c2d12" font-size="14" font-weight="700">🏆 NIV 国家创新签证 (858)</text>
  <text x="200" y="287" text-anchor="middle" fill="#92400e" font-size="10">国际公认杰出成就 · 提名人(Form1000)</text>
  <text x="200" y="302" text-anchor="middle" fill="#a16207" font-size="9">无投资额 · 无年龄上限 · 一步到位PR</text>

  <!-- 189/190/491 -->
  <rect x="360" y="245" width="280" height="65" rx="10" fill="url(#tech)" filter="url(#shadow)"/>
  <text x="500" y="269" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">🎓 189 / 190 / 491 技术移民</text>
  <text x="500" y="287" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">EOI打分制 · 职业评估 · 英语成绩</text>
  <text x="500" y="302" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">189=独立PR · 190=州担保+5 · 491→3年→191</text>

  <!-- 482/186 -->
  <rect x="660" y="245" width="280" height="65" rx="10" fill="url(#emp)" filter="url(#shadow)"/>
  <text x="800" y="269" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">💼 482 SID / 186 ENS</text>
  <text x="800" y="287" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">雇主担保 · Specialist/Core Skills</text>
  <text x="800" y="302" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">482满2年→186 PR · 180天换雇主</text>

  <!-- Merge arrows -->
  <line x1="200" y1="310" x2="200" y2="340" stroke="#f5a623" stroke-width="2"/>
  <line x1="500" y1="310" x2="500" y2="340" stroke="#0d9488" stroke-width="2"/>
  <line x1="800" y1="310" x2="800" y2="340" stroke="#7c3aed" stroke-width="2"/>
  <line x1="70" y1="340" x2="900" y2="340" stroke="#006400" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="500" y1="340" x2="500" y2="370" stroke="#006400" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- PR -->
  <rect x="130" y="378" width="500" height="65" rx="12" fill="url(#pr)" filter="url(#shadow)"/>
  <text x="380" y="404" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🦘 澳大利亚永久居民（PR）</text>
  <text x="380" y="422" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">居住国 · Medicare全民医保 · 子女免费公立教育 · 自由往来新西兰</text>
  <text x="380" y="437" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9">PR居住满4年可入籍 · Centrelink福利等待期2-4年 · 养老10年</text>

  <!-- Citizenship wait -->
  <line x1="380" y1="443" x2="380" y2="475" stroke="#006400" stroke-width="2" marker-end="url(#arrowG)"/>
  <rect x="395" y="450" width="90" height="20" rx="5" fill="#dcfce7"/>
  <text x="440" y="464" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">4年 →</text>

  <!-- Citizenship -->
  <rect x="200" y="482" width="360" height="45" rx="12" fill="#006400" filter="url(#shadow)"/>
  <text x="380" y="505" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">🇦🇺 澳大利亚公民</text>
  <text x="380" y="520" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">4年居住·末12月PR·公民测试·选举权·新西兰特权</text>

  <!-- Bottom note -->
  <rect x="30" y="540" width="700" height="45" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="558" text-anchor="middle" fill="#6b7280" font-size="11">
    🏢 事业国=中国 ｜ 🛡️ 管钱地=香港/新加坡 ｜ 🦘 居住国=澳大利亚 ｜ 🔄 PR可自由往来新西兰
  </text>
  <text x="380" y="575" text-anchor="middle" fill="#9ca3af" font-size="9">
    ⚠️ BIIP 188已2024.7关停 · NIV需杰出成就 · 技术移民EOI实际竞争75-85+ · 雇主担保需真实体
  </text>

  <text x="380" y="608" text-anchor="middle" fill="#9ca3af" font-size="10">澳大利亚移民 · 财富架构图</text>
</svg>