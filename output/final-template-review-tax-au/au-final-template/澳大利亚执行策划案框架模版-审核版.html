## 摘要结论

本方案建议客户以澳大利亚移民路径为主路径，根据客户背景在以下六大通道中精准匹配：

- **NIV Subclass 858（国家创新签证）**——2024年12月6日新推出，取代原GTI和BIIP，需国际公认杰出成就+澳大利亚提名人，一步到位PR，无固定投资额，无年龄上限
- **189独立技术移民**——职业在MLTSSL上，EOI≥65分（实际75-85+），年龄<45，一步到位PR，2025-26名额16,900
- **190州担保技术移民**——州提名+5分，一步到位PR，获签后须在提名州住2年，2025-26名额12,850
- **491偏远地区技术临签**——5年临时签证，州担保+15分，3年转191 PR，偏远地区居住+应税收入≥$53,900/年
- **482 SID技能需求签证**——2024年12月7日取代TSS 482，三层次（Specialist/Core/Labour Agreement），持满2年转186 PR
- **186 ENS Direct Entry**——一步到位PR，职业在CSOL上+3年工作经验+职业评估+年龄<45，无需先持临签
- **186 ENS TRT（482转PR）**——持482满2年+为同一雇主全职工作，2025年改革后无年龄上限

⚠️ **重要提示**：BIIP 188投资移民（含SIV 500万澳元重大投资者签证）已于2024年7月31日永久关停，不再接受新申请。NIV Subclass 858是当前唯一不依赖雇主的"精英"路径，但需杰出成就而非投资额。

澳大利亚PR的核心价值：**全民医保Medicare**（PR即享免费公立医疗）、**子女免费公立中小学教育**、**大学本地学费+CSP/HECS-HELP贷款**、**PR可自由往来新西兰生活工作**、**居住满4年可入籍**（含12个月PR）、**全球宜居国家品质生活**。

本方案执行重点：第一，精准匹配移民通道；第二，职业评估与技术资格贯穿始终；第三，EOI打分优化与州担保策略；第四，税务规划——澳大利亚税务居民全球征税（中澳DTA可避免双重征税）；第五，资金来源与跨境合规。

| Q2 | 职业评估 | P0 | 技术移民路径（189/190/491/186 DE）必须通过澳大利亚职业评估机构认证，不同职业对应不同评估机构（VETASSESS/ACS/EA/CPA等），周期3-6个月 |
| Q3 | EOI分数竞争 | P0 | 189/190/491需EOI≥65分方可入池，实际获邀分数远高于65分（会计/IT通常需85-95+），英语、年龄、工作经验是关键加分项 |
| Q4 | BIIP投资移民已关停 | P0 | 原BIIP 188签证（含SIV 500万澳元）已于2024年7月永久关停，无替代投资移民路径；NIV不是投资签证 |
| Q5 | 子女年龄限制 | P1 | 澳大利亚技术移民一般要求随行子女≤23岁且未婚、经济依赖；NIV/雇主担保有类似要求 |
| Q6 | 州担保竞争与居住义务 | P1 | 190/491需获得州政府提名，各州清单+邀请政策独立且频繁变动，获签后有居住义务 |
| Q7 | 英语成绩时效 | P1 | IELTS/PTE/TOEFL成绩有效期3年（部分评估机构仅认可2年内），需在有效期内递交EOI和签证申请 |
| Q8 | PR维持与RRV续期 | P2 | PR旅行便利有效期5年，到期需申请RRV（Resident Return Visa）；5年内未住满2年者RRV可能仅给3-12个月 |
| Q9 | 中澳税务双重合规 | P2 | 澳大利亚对税务居民实行全球征税，中澳有DTA税收协定，但需做税务居民判定及CFC/CGT规划 |
| Q10 | 澳大利亚生活成本 | P3 | 悉尼/墨尔本生活成本较高（相当于中国一线城市），偏远地区成本可降低30-50% |

### 1.3 根本判断

**表面问题**：客户想办一个澳大利亚PR。

**真实问题**：客户需要一个全球最宜居国家之一的永久居留权，以解决子女教育（免费公立K-12+本地大学学费+HECS-HELP贷款）、健康保障（Medicare全民医保）、生活质量（空气/环境/食品安全）、事业发展（澳大利亚经济稳定+亚太门户）、全球流动性（澳大利亚护照免签180+国家）五大需求。核心矛盾在于：职业评估+EOI分数竞争激烈（技术移民）+雇主匹配难度（雇主担保）+杰出成就门槛极高（NIV） vs 客户对时间效率和申请成功率的容忍度。

## 二、核心策略

### 2.1 三分离定位

| 维度 | 澳大利亚方案中的定位 | 判断 |
|---|---|---|
| 事业国 | 中国/澳大利亚双线 | 澳大利亚可作为亚太区域总部、矿业/农业/教育/科技/金融服务平台或新市场 |
| 居住国 | 澳大利亚为主+中国探亲 | PR须满足居住要求（5年住满2年续RRV）；入籍需4年（含12个月PR） |
| 福利国 | 澳大利亚Medicare+公立教育体系 | 全民免费公立医保+K-12免费公立教育+大学本地学费+CSP/HECS-HELP |
| 管钱地 | 澳大利亚/新加坡/香港多轨 | 澳元资产配置、澳大利亚房产投资、家族信托架构、亚太财富管理 |
| 功能性身份 | 澳大利亚PR→可选澳大利亚护照 | PR即享自由工作/生活/经商+新西兰自由通行；入籍后180+国免签 |

### 2.2 六大路径选择矩阵

| 路径 | 适合人群 | 核心条件 | 签证类型 | 转PR时间 | 配偶工作 | 推荐优先级 |
|---|---|---|---|---|---|---|
| NIV 858 | 国际顶尖人才 | 杰出成就记录+澳提名人+Form 1000 | 一步PR | 获批即PR | ✅ | ★★★★★（但门槛极高） |
| 189独立技术移民 | 高EOI评分专业人士 | 职业在MLTSSL+EOI≥65+<45岁 | 一步PR | 获批即PR | ✅ | ★★★★★ |
| 190州担保技术 | 愿意在特定州定居 | 州提名+5分+EOI≥65+<45岁 | 一步PR | 获批即PR | ✅ | ★★★★ |
| 491偏远地区 | EOI评分不足者 | 州担保+15分+偏远地区居住 | 5年临时 | 3年→191 PR | 按要求 | ★★★ |
| 482 SID雇主担保 | 有澳洲雇主offer | 雇主担保+CSOL/Specialist+薪资达标 | 临时工签 | 2年→186 PR | ✅ | ★★★★ |
| 186 ENS Direct Entry | 有雇主+3年经验+<45岁 | 职业在CSOL+职业评估 | 一步到位PR | 6-12月 | ✅ | ★★★★ |
| 186 ENS TRT（482转） | 持482满2年+同雇主 | 2025改革后无年龄上限 | 转PR | 持482满2年后 | ✅ | ★★★★ |

### 2.3 推荐核心路线

**推荐方案A：NIV Subclass 858 国家创新签证——精英首选（仅限国际顶尖人才）。**

理由：
1. **一步到位PR**：获批即获永久居留，无临时签证过渡阶段。
2. **无固定投资额**：以个人成就和对澳大利亚的贡献潜力代替投资金额，不要求资金门槛。
3. **无年龄上限**：18岁以下或55岁以上需证明对澳大利亚有特殊利益，但无硬性上限。
4. **仅需功能性英语**：Functional English（雅思约4.5分），远低于技术移民要求。
5. **优先审理**：国际顶级奖项获得者→政府提名→Tier1（关键科技/健康/可再生能源）→Tier2（农业/国防/教育/金融科技/基建）。
6. **全家同行**：可担保配偶、23岁以下未婚子女。
7. **⚠️ 门槛极高**：须拥有国际公认的杰出和卓越成就记录+在专业领域内有持续的知名度+澳大利亚提名人（Form 1000）。

**推荐方案B：189独立技术移民——高评分专业人士首选。**

理由：
1. **一步到位PR**：无需住特定州，全澳自由选择居住地。
2. **无需雇主/州担保**：纯凭个人能力和EOI分数竞争。
3. **2025-26名额16,900**：独立技术移民配额充足。
4. **⚠️ 竞争激烈**：实际获邀分数通常75-85+（会计/IT需90-95+），职业评估是关键前提。
5. **英语是核心加分项**：雅思各项8分（或PTE 79+）=20分；雅思各项7分=10分。

**推荐方案C：190州担保技术移民——争取额外加分路径。**

理由：
1. **州担保+5分**：自动增加EOI分数，提高获邀概率。
2. **一步到位PR**：获批即PR，仅需在提名州居住满2年。
3. **各州独立配额**：2025-26年共12,850个名额（190）+7,500个（491偏远地区）。
4. **⚠️ 需研究州担保政策**：各州有独立职业清单和提名要求，政策频繁变动。

**推荐方案D：482 SID→186 雇主担保路径——有澳洲工作经验人士首选。**

理由：
1. **2024年12月改革**：取代旧TSS 482，三层次体系更清晰。
2. **转PR时间短**：持482满2年即可通过186 TRT转PR（旧政要求3年）。
3. **工作灵活性提升**：被解雇后180天找新雇主（旧政60天）。
4. **2025改革利好**：482转186 TRT无年龄上限。
5. **⚠️ 需要澳大利亚雇主担保**：需真实岗位+薪资达标（Core Skills≥$76,515/年，Specialist≥$141,210/年）。

**推荐方案E：186 ENS Direct Entry——有经验的职场人士一步到位PR。**

理由：
1. **一步到位PR**：无需先持临时签证，批准即获永久居留权。
2. **快速通道**：全程约6-12个月（含职业评估+雇主提名+签证审批）。
3. **核心条件明确**：①职业在CSOL清单 ②通过职业评估 ③3年以上相关工作经验 ④年龄<45 ⑤雇主担保。
4. **与189/190相比**：无需EOI排队等邀请，雇主确定性高。
5. **⚠️ 需要澳大利亚雇主担保**：雇主需提供正式全职工作岗位并证明无法从本地劳动力市场填补。
3. **⚠️ 雇主合规**：雇主须为合法运营的澳大利亚企业，能提供真实岗位。

**推荐方案F：491偏远地区技术临签——EOI分数不足的保底路径。**

理由：
1. **州担保+15分**：额外15分大幅提升EOI竞争力。
2. **3年转191 PR**：持有491满3年+偏远地区居住+应税收入≥$53,900/年→申请191永久居民。
3. **Medicare资格**：491持有人可申请Medicare。
4. **⚠️ 偏远地区居住**：需在实际居住于指定偏远地区，非所有区域都适合家庭生活。
5. **⚠️ 收入门槛**：须连续3年满足最低应税收入要求。

## 三、合规清理详细方案

### 3.1 职业评估合规（技术移民/雇主担保核心）

澳大利亚技术移民和雇主担保类签证（189/190/491/186 DE）要求申请人通过指定职业评估机构的资格认证。

| 职业类别 | 评估机构 | 典型周期 | 核心要求 | 常见职业 |
|---|---|---|---|---|
| 工程师类 | Engineers Australia (EA) | 8-12周（加急15工作日） | CDR能力证明报告（非华盛顿协议学历）或直接互认 | 土木/机械/电气/软件工程师 |
| ICT/IT类 | ACS (Australian Computer Society) | 8-12周 | 学历+工作经验年限（减年规则：非ICT学历扣6年） | 软件工程师/IT项目经理/系统分析/网络安全 |
| 会计/审计类 | CPA/CAANZ/IPA | 4-8周 | 学历课程匹配（12门核心课程）+雅思A类7分 | 会计师/审计师/财务经理 |
| 管理/商业类 | VETASSESS | 8-12周 | 学历+相关工作经验年限匹配ANZSCO级别 | 市场/HR/供应链/项目经理/企业服务经理 |
| 医护类 | AHPRA/ANMAC等 | 4-12周 | 注册/资格审核+临床经验 | 注册护士/医生/理疗师 |
| 技工类 | TRA (Trades Recognition Australia) | 8-16周 | 学历+学徒/工作经验+实操评估 | 电工/水管工/木工/厨师 |
| 教师类 | AITSL | 8-12周 | 学历+实习+教育背景匹配 | 中小学教师/幼教 |
| NIV成就类 | 无需职业评估 | — | 国际公认杰出成就+Form 1000提名人 | 各领域顶尖人才 |

### 3.1.1 职业评估关键注意事项

- 职业必须在对应签证的职业清单上：189需MLTSSL，190/491需相应州清单或MLTSSL+STSOL，186 DE需CSOL
- 职业评估有效期通常2-3年，须在提交EOI和签证申请时有效
- 评估机构对"相关工作经验"的认定标准不同（ACS有减年规则，VETASSESS有年限要求）
- 学历与职业评估不一致时，可能需要额外工作经验或RPL（Recognition of Prior Learning）
- 职业代码（ANZSCO Code）须精确匹配，不同代码对应不同评估标准

### 3.2 英语能力合规

| 英语水平 | 雅思(IELTS) | PTE Academic | 托福iBT | OET | EOI加分 |
|---|---|---|---|---|---|
| Functional | 各项4.5分 | 30 | 32 | — | 0分（NIV可用） |
| Competent | 各项6分 | 50 | 听力12/阅读13/写作21/口语18 | B | 0分（基础门槛） |
| Proficient | 各项7分 | 65 | 听力24/阅读24/写作27/口语23 | B | **+10分** |
| Superior | 各项8分 | 79 | 听力28/阅读29/写作30/口语26 | A | **+20分** |

> ⚠️ 英语成绩有效期3年（部分评估机构仅认可2年内成绩），须在EOI提交和签证获批时均有效。

### 3.3 EOI打分优化策略（189/190/491）

| 英语能力 | 20分 | 雅思各项8分（PTE 79+） | 培训+多次考试；PTE比雅思更容易出高分 |

| 澳洲学历 | 10分 | 至少2年澳洲学习 | 可在澳读硕博加EOI分 |

### 3.4 资金来源合规（需说明迁移安顿资金）

虽然澳大利亚技术移民不要求投资额，但申请人须证明有足够资金支持在澳安顿生活（或在澳有Job offer+薪资证明）。

| 路径 | 资金证明方式 | 说明 |
|---|---|---|
| 189/190 | 通常不需固定资金证明，但需填申报表声明资金充足 | 建议准备$20,000-50,000澳元银行存款证明 |
| 491 | 各州可能有不同要求 | 如南澳/塔州可能要求$20,000-30,000银行存款证明 |
| 482 SID | 雇主担保，不考察申请人个人资产 | 但有工资担保额度要求 |
| 186 ENS | 雇主担保，不考察个人资产 | 同482 |
| NIV 858 | 不要求投资额，但需证明有能力在澳独立生活 | 高成就申请人通常财务自给能力不存疑 |

### 3.5 中国国籍与澳大利亚PR

- 取得澳大利亚PR=有在澳大利亚永久居住和工作的权利，但国籍仍为中国
- PR持有满1年+在澳居住满4年（含12个月PR）可申请入籍澳大利亚
- 中国不承认双重国籍——入籍澳大利亚意味自动丧失中国国籍（依据《中华人民共和国国籍法》第9条）
- PR持有者如在境外连续停留超过5年（PR旅行权过期后未续RRV），可能失去PR身份
- PR旅行便利（Travel Facility）有效期5年——到期需申请RRV续期
- 如过去5年在澳居住满2年，RRV可续5年；未满2年者RRV可能仅给3-12个月

### 3.6 反洗钱与银行KYC

澳大利亚银行对KYC/AML要求严格：
- 主申请人护照、身份证、户口本、婚姻证明
- 无犯罪记录证明（近12个月内）
- 资金来源声明（大额存入需解释）
- 澳大利亚税号（TFN）——PR获批后须申请
- 100-point身份验证（护照70分+驾照/银行对账单等）

## 五、贡献与资格使用建议

### 5.1 NIV 858成就证明准备框架

NIV（国家创新签证）不要求投资金额，但要求申请人证明其国际认可的"杰出和卓越成就"。

|---|---|---|---|

| 健康产业贡献 | 临床研究+医学专利+公共卫生项目+国际同行评审 | Tier 1 | 医药/医疗器械/数字健康/公共卫生 |

## 六、财富架构搭建方案

### 6.1 推荐架构：澳大利亚为生活基地+亚洲财富管理中心

![澳大利亚财富架构](flow-财富架构.svg)

### 6.2 澳大利亚财富管理架构要点

| 架构层级 | 工具/实体 | 用途 | 税务考量 |
|---|---|---|---|
| 生活资产层 | 个人名下澳洲房产（自住） | 家庭居住+资产增值 | 自住房免CGT(主住宅豁免)；无房产税(仅印花税+地税) |
| 投资房产层 | 个人/信托持有投资房产 | 租金收入+资本增值 | 负扣税(Negative Gearing)+CGT折扣（持>12月减半） |
| 退休储蓄层 | Superannuation（超级年金） | 养老金储蓄（雇主强制供款11.5%/2025-26） | 供款期税率15%（远低于个人最高税率45%） |
| 澳洲投资层 | 股票/ETF/Managed Fund | 澳股+全球资产配置 | 红利抵免(Franking Credits)+CGT折扣 |
| 离岸保护层 | 新加坡/香港架构 | 亚太资产隔离+跨境规划 | 关注CFC规则（受控外国企业） |
| 家族传承层 | Family Trust（家族信托） | 收入分配+资产保护+代际传承 | 信托收入分配税务优化；注意Foreign Trust申报 |

### 6.3 ⚠️ 澳大利亚税务居民关键提醒

| 身份 | 主要税务影响 |
|---|---|
| 澳大利亚税务居民 | 全球收入在澳申报（可用外国税收抵免FTC） |
| 非税务居民 | 仅澳大利亚来源收入纳税（但无免税额+高税率起始） |
| PR但长期在海外 | 须做税务居民判定（183天测试/住所测试）；可能触及CFC规则 |
| 中国+澳大利亚双重税务居民 | 中澳DTA可打破僵局——以永久住所→重要利益中心→习惯性居所→国籍排序 |

> ⚠️ 澳大利亚有CFC（Controlled Foreign Corporation）规则：如在澳大利亚境外拥有受控企业，该企业利润可能被当期归属至澳大利亚税务居民股东。另有Transferor Trust规则——向外国信托转移资产可能触发即期税务后果。

### 6.4 跨境架构建议

| 场景 | 架构建议 | 税务/合规考量 |
|---|---|---|
| 中国→澳大利亚安顿 | 合规购汇+境外账户→澳洲银行 | 保留完整SWIFT记录+资金路径说明 |
| 澳大利亚房产投资 | 个人持有自住房+Trust持有投资房 | 主住宅CGT豁免+Trust收入分配灵活 |
| 澳大利亚业务运营 | Australian Pty Ltd（LLC等同） | 公司税率25%（基础税率）/30% |
| 亚太业务运营 | 新加坡控股+澳大利亚运营子公司 | 澳新DTA+转让定价合规 |
| 家族传承 | Australian Family Trust | 收入分配→低税率受益人（如子女/非工作配偶） |
| 返程投资中国 | 澳洲架构→香港→WFOE→中国运营 | FDI外商投资负面清单审查 |

### 6.5 不建议架构

- 不建议中国个人直接以非税务居民身份大量持有澳大利亚投资房产（无免税额+CGT全征+地税附加）
- 不建议忽视Superannuation（超级年金是最具税务效率的长期储蓄工具）
- 不建议在成为澳大利亚税务居民前过早将海外资产转至澳洲（触发CGT事件）
- 不建议忽视澳大利亚与中国的CRS信息交换（自2018年起交换金融账户信息）
- 不建议架构过于复杂导致合规成本高于税务节省

## 七、税务分析

### 7.1 澳大利亚税制核心

| 税种 | 税率 | 说明 |
|---|---|---|
| 个人所得税 | 0%-45%（五级累进） | 免税额$18,200；$18,201-45,000=19%；$45,001-120,000=30%；$120,001-180,000=37%；>$180,000=45% |
| 资本利得税(CGT) | 按个人所得税率（持>12月减半） | 自住房免CGT（主住宅豁免）；非居民取消CGT折扣 |
| 公司所得税 | 25%（小企业·营业额<$5,000万）或30% | 红利抵免(Franking Credits)可避免双重征税 |
| 商品服务税(GST) | 10% | 年营业额>$75,000须注册 |
| 印花税(Stamp Duty) | 各州不同（约3%-7%） | 购房时一次性支付；海外买家附加印花税（各州不同，约7-8%） |
| 地税(Land Tax) | 各州不同 | 投资房产按地价征收，自住房免（各州有起征点） |
| 超级年金(Super Guarantee) | 雇主缴11.5%（2025-26） | 逐步增至12%（2027年） |
| Medicare Levy | 应税收入的2% | 所有澳大利亚税务居民；高收入无私人医保另征Medicare Levy Surcharge（1%-1.5%） |
| FBT(附加福利税) | 47% | 雇主提供非现金福利缴税 |

### 7.2 税务居民判断

| 情形 | 税务身份判断 | 影响 |
|---|---|---|
| 获得PR并在澳实际居住 | 通常构成澳大利亚税务居民 | 全球收入须申报+可享受个人免税额+Medicare Levy |
| 183天测试 | 在澳住满183天/财年→通常为税务居民 | 除非常规住所在境外+无意在澳居住 |
| 住所测试(Domicile Test) | 在澳大利亚有住所（PR+购房/租房） | 即使短期离境，仍可能被认定为税务居民 |
| PR但长期不在澳居住 | 可能为非税务居民 | 仅澳来源收入纳税；无免税额；取消CGT折扣 |
| 双重税务居民（中+澳） | 中澳DTA判定 | 以永久住所→重要利益中心→习惯性居所→国籍排序 |
| 超级年金测试 | 雇主为在澳工作的雇员强制供款 | 无论签证类型 |

### 7.3 澳大利亚税制核心优势与挑战

| 优势 | 说明 |
|---|---|
| 无遗产税 | 澳大利亚1979年废除遗产税，是最少数无遗产税/赠与税的发达国家之一 |
| 红利抵免(Franking Credits) | 澳已缴税公司分配红利时，股东可用Franking Credits抵免个人所得税（甚至退税） |
| CGT折扣 | 持有资产>12个月后出售，仅50%的资本利得计入应税收入（税务居民） |
| 主住宅CGT豁免 | 自住房出售免资本利得税（需满足居住条件） |
| 负扣税(Negative Gearing) | 投资房亏损可用其他收入（工资/生意收入）抵扣 |
| 超级年金(Super) | 供款期税率仅15%，退休阶段收入免税（60岁以上+符合条件） |
| 中澳DTA | 避免双重征税+税收信息交换 |

| 挑战 | 说明 |
|---|---|
| 高边际税率 | 最高45%个人所得税率（>$190,001/年·2025-26），另加2% Medicare Levy |
| CFC规则 | 受控外国企业利润可能被当期归属→澳大利亚税务居民 |
| 转移信托规则 | 向外国信托转移资产可能触发即期税务（Section 99B） |
| 非居民附加税 | 非税务居民购买澳房产须支付额外印花税+地税附加 |
| 全球申报义务 | 澳大利亚税务居民需申报全球收入+海外资产 |
| CRS交换 | 中国自2018年起与澳大利亚交换金融账户信息 |
| 离澳税务清算 | 放弃澳大利亚税务居民身份时，除自住房和澳洲Super外，所有资产视同处置（deemed disposal）触发CGT |

### 7.4 税务风险边界

- 取得PR后如在澳居住>183天/财年=自动成为澳大利亚税务居民→全球征税，此不可逆
- 中国收入（工资/分红/租金/资产出售）须在澳申报，可用FTC抵免
- 中国房产出售增值在澳也须申报资本利得（除非视为pre-CGT资产或非税务居民时期）
- 持有中国公司股权可能涉及CFC规则触发
- CRS信息交换：中澳自2018年起交换金融账户信息（含银行存款、理财产品、保险等）
- 成为澳大利亚税务居民前，建议评估资产成本基础重设策略（如可行）
- 澳大利亚无遗产税，但信托和公司架构需提前设计（在成为税务居民前）
- 超级年金(Super)须在60岁（且满足释放条件）后方可取用

### 8.2.1 个人境外投资合规——37号文登记

37号文全称《国家外汇管理局关于境内居民通过特殊目的公司境外投融资及返程投资外汇管理有关问题的通知》（汇发〔2014〕37号），是境内居民个人境外投资最重要的合规路径之一。

**适用对象：**
- 境内居民个人以境外特殊目的公司(SPV)进行境外投融资及返程投资
- 常见场景：个人在境外设立BVI/开曼/香港公司接收境内资产，用于澳大利亚商业/房产投资

**核心要求：**
- 需在设立/控制SPV后、向SPV出资前办理外汇登记
- 登记机关：国家外汇管理局（通过银行办理）
- 须提供：SPV注册文件、境内居民身份证明、境外融资商业计划书等

**未办理37号文登记的后果：**
- 无法合规将境内资产注入境外SPV
- 返程投资（WFOE/FDI）时外汇无法合规入境
- 可能被认定为逃汇，面临行政处罚甚至刑事责任
- 境外上市时构成重大合规障碍

**操作要点：**
- 37号文登记须在"出资前"完成（先登记后出资），不可事后补办
- 登记须在SPV设立后尽快办理（建议在SPV设立后30日内启动）
- 实际办理周期：通常1-3个月
- 如需跨境架构，应在签约前由律师确认37号文可行性

### 8.3 严禁路径

- 地下钱庄/找换店大额换汇（涉及洗钱+刑事风险）
- 虚假贸易/虚开发票
- 现金搬运出入境（单次$10,000以上未申报可能没收+处罚）
- 第三方代付且无法解释最终受益人
- 多人拆分5万美元购汇后集中用于同一目的（外管局"蚂蚁搬家"监控）
- 虚拟货币换汇（政策灰色地带，涉及洗钱风险）

### 9.2 NIV Subclass 858 国家创新签证——深度解析

| 维度 | 内容 |
|---|---|
| **法律依据** | Migration Regulations 1994, Schedule 2, Subclass 858; 2024年12月6日起取代原GTI和BIIP |
| **签证类型** | 永久居留签证（一步到位PR） |
| **适用人群** | 在科学、技术、工程、健康、教育、艺术、体育、商业等领域拥有国际公认卓越成就的顶尖人才 |
| **核心要求** | ①国际公认的杰出和卓越成就记录 ②在专业领域内有持续的知名度 ③有能力对澳大利亚创新/生产力/竞争力做出重大贡献 ④获得澳大利亚全国声誉提名人（Form 1000）⑤提交EOI并获邀请 |
| **投资额** | **无固定投资金额要求**（非投资类签证） |
| **年龄** | 无严格上限；18岁以下或55岁以上需证明对澳大利亚有特殊利益 |
| **英语** | 仅需功能性英语（Functional English·雅思各项4.5分）；不达标可支付额外语言培训费豁免 |
| **优先领域(Tier 1)** | 关键科技(Critical Technologies)、健康产业(Health Industries)、可再生能源与低排放技术(Renewables & Low Emission Technologies) |
| **优先领域(Tier 2)** | 农业食品与农业科技、国防与太空、教育、金融服务与金融科技、基础设施与交通 |
| **审理优先级** | ①国际顶级奖项获得者（任何领域）→ ②联邦/州/领地政府提名 → ③Tier 1领域杰出成就者 → ④Tier 2领域 → ⑤其他合格申请人 |
| **申请流程** | EOI提交→获邀→60天内提交签证申请→审理→获批PR |
| **审理时间** | Tier 1优先领域约3-6个月；其他约6-12个月 |
| **随行亲属** | 配偶+23岁以下未婚经济依赖子女 |
| **配偶工作** | 获批后配偶可自由工作 |
| **优点** | 一步到位PR、无投资额要求、无年龄上限、仅需功能性英语、优先审理 |
| **缺点** | 成就门槛极高、"国际公认+持续的知名度"标准严格、需澳大利亚提名人 |

### 9.3 189独立技术移民——深度解析

| 维度 | 内容 |
|---|---|
| **法律依据** | Migration Regulations 1994, Schedule 2, Subclass 189 |
| **签证类型** | 永久居留签证（一步到位PR） |

| **核心要求** | ①职业在MLTSSL上 ②通过指定评估机构职业评估 ③EOI≥65分（实际75-85+） ④Competent English（雅思各项6分+）⑤收到移民局邀请 |
| **州担保** | 不需要州/领地担保，可在全澳任何地方居住和工作 |

| **EOI核心打分** | 年龄30分+英语20分+海外工作经验15分+学历20分+配偶10分+其他=最高约100分 |

| **优点** | 一步到位PR、全澳自由居住、无雇主/州担保约束、配偶自由工作 |
| **缺点** | EOI竞争极其激烈、职业评估周期3-6个月、热门职业（会计/IT）需85-95+分、年龄45岁硬截止 |

### 9.6 482 SID技能需求签证——深度解析

## 十四、重要风险声明

### 14.1 NIV路径风险

**NIV Subclass 858的"国际公认杰出成就"标准非常高，远超普通优秀水平。仅凭国内奖项、常规学术发表或商业成功通常不足以满足门槛。须提供客观、可验证的国际影响力证据。如"成就"被高估而实际上不符合标准，EOI可能长期不获邀请或申请被拒。此外，须找到澳大利亚领域内具有"全国声誉"的提名人——如果客户缺乏澳大利亚学术/行业联系，这可能成为重大障碍。**

### 14.2 BIIP投资移民关停风险

**原BIIP 188商业创新与投资签证（含SIV 500万澳元重大投资者签证）已于2024年7月31日永久关停。任何声称仍可办理澳大利亚投资移民（BIIP）的中介/机构均须高度警惕——BIIP已不再接受新申请。NIV不是投资移民替代品。目前澳大利亚无任何"投资$X万即可获PR"的路径。**

### 14.3 职业评估风险

**技术移民（189/190/491/186 DE）的职业评估是"一票否决"项。不同评估机构标准差异巨大：ACS对ICT职业有"减年"规则（学历不相关扣减2-6年工作经验），VETASSESS对管理类职业有严格的"相关工作经验年限"要求，EA对非华盛顿协议学历需CDR能力证明报告。职业评估未通过=EOI无法入池=签证不可递交。**

### 14.4 EOI分数风险

**EOI≥65分仅是最低入池门槛，实际获邀分数远高于此。2025-26财年热门职业：会计常需95-100分、软件工程/ICT常需90-95分、土木工程常需80-85分。每月邀请轮次名额有限→高分优先+同分按提交时间排序。如分数不足以在邀请配额范围内获邀，EOI可能在SkillSelect系统中"沉没"2年后自动过期。**

### 14.5 年龄硬截止风险

**189/190/491/186 Direct Entry的年龄上限为45岁。如主申请人在45周岁生日前未收到EOI邀请（而不仅是提交EOI），将永久失去资格。建议至少提前2-3年规划，留足职业评估+英语+EOI等待+审理时间缓冲。**

### 14.6 英语成绩风险

**英语成绩有效期3年（部分评估机构仅认可2年内成绩）。如EOI等待时间过长，英语成绩可能在获邀/递签时已过期→需重考。PTE Academic一般比IELTS更容易出高分，建议技术移民客户优先选择PTE。**

### 14.7 雇主担保风险

**482 SID和186 ENS依赖澳大利亚雇主。雇主合规风险包括：雇主不符合担保资格、岗位不真实、薪资不达标、企业倒闭/裁员。482持证人被解雇后仅有180天（旧政60天）找新雇主——若180天后仍无新雇主，签证可能被取消。186 TRT要求为"同一雇主"全职工作满2年——如果期间换雇主，TRT归零重新计算。**

### 14.8 偏远地区路径风险

**491→191路径要求在偏远地区居住+工作满3年+应税收入≥$53,900/年。偏远地区就业机会、教育资源、医疗服务可能不如大城市。如果在3年内未能满足居住或收入要求，191 PR将无法获批，491 5年期满后需离境。**

### 14.9 税务风险

**获得澳大利亚PR并在澳居住>183天/财年=成为澳大利亚税务居民→全球收入须在澳申报。澳大利亚最高个人所得税率45%（+2% Medicare Levy），需提前做税务规划。CFC（受控外国企业）规则可能导致中国公司利润被当期归属澳大利亚税务股东。离开澳大利亚税务居民身份时有"deemed disposal"规则——除自住房和Super外的资产视同处置触发CGT。**

### 14.10 PR维持风险

**PR旅行权有效期5年。如5年内在澳居住不满2年，续RRV时可能仅获得3-12个月的短期RRV，需证明与澳大利亚有实质联系（substantial ties）。如果5年内几乎未在澳居住且无法证明实质性联系，RRV可能被拒→失去PR身份。入籍须满足4年居住（含12个月PR）+离境天数要求——居住规划需提前布局。**

### 14.11 子女随行风险

**技术移民随行子女须≤23岁且未婚、经济依赖。23岁生日后即不可随行。如果审理时间+排期导致子女超过23岁，将失去随行资格→须独立走留学移民路径（成本更高+时间长）。**

### C. 法律适用注意事项

1. **BIIP已永久关停**：任何声称可办理澳大利亚"投资移民"的中介/机构须高度警惕——BIIP于2024年7月31日起不再接受新申请。NIV不是投资移民替代品，需国际公认杰出成就。
2. **NIV的"成就"标准不可低估**：移民局要求"国际公认的卓越和杰出成就+持续的知名度"，不是普通商业成功或国内优秀水平。谎报成就可能导致申请被拒+未来签证不利记录。
3. **职业评估是硬前提**：技术移民和186 DE的申请须在职业评估通过后才有资格入池/递交。不同评估机构标准不同，评估前应咨询MARA注册移民代理明确策略。
4. **EOI分数≠获邀**：EOI≥65分仅入池，实际获邀分因职业和供需而异。建议以最近12个月该职业的实际邀请分数为参考目标。
5. **年龄计算精确到天**：189/190/491必须在45周岁生日前收到移民局正式邀请（非仅提交EOI）。建议留2年以上缓冲。
6. **雇主担保关系的合规性**：482转186 TRT必须证明为"同一雇主"全职工作满24个月。中途换雇主须在180天内找到新雇主+新提名获批。
7. **税务建议须独立判断**：本方案税务分析为初步框架，不构成正式税务建议。客户落地前须由澳大利亚注册会计师(CPA)或税务律师独立评估。
8. **所有费用以签约方合同为准**：本方案预算为参考口径，实际费用以代理合同、移民局官网最新收费标准、银行账单为准。

function calcEOI(){
  var fields=['e_age','e_eng','e_os','e_au','e_edu','e_stem','e_sp','e_naati','e_py','e_state'];
  var total=0,missing=false;
  for(var i=0;i<fields.length;i++){
    var el=document.getElementById(fields[i]);
    if(!el || el.value==='') {missing=true;continue}
    total+=parseInt(el.value)||0;
  }
  var badge=document.getElementById('eoiScore');
  var result=document.getElementById('eoiResult');
  if(badge) badge.textContent=total;
  if(!result) return;
  var ageEl=document.getElementById('e_age');
  var age45=(ageEl&&ageEl.value==='0');
  if(age45){
    result.className='eoi-result fail';
    result.innerHTML='❌ 年龄≥45岁，不满足189/190/491/186 DE技术移民基本条件<br><span style="font-weight:400;font-size:12px">建议转向NIV 858或482 SID雇主担保路径</span>';
    return;
  }
  if(missing){
    result.className='eoi-result warn';
    result.innerHTML='📊 请完善所有打分项以计算EOI总分';
    return;
  }
  var stateEl=document.getElementById('e_state');
  var stateBonus=parseInt(stateEl&&stateEl.value||'0');
  var path189=(stateBonus===0?'189':(stateBonus===5?'190':'491'));
  var minLine=stateBonus===0?75:(stateBonus===5?80:75);
  if(total>=minLine){
    result.className='eoi-result pass';
    result.innerHTML='✅ EOI总分 <b>'+total+'分</b> — 达到<b>'+path189+'</b>邀请线参考值（≥'+minLine+'分）<br><span style="font-weight:400;font-size:12px">⚠️ 实际获邀取决于职业配额和同职业申请人竞争</span>';
  } else if(total>=65){
    result.className='eoi-result warn';
    result.innerHTML='⚠️ EOI总分 <b>'+total+'分</b> — 可入池(≥65分)但低于<b>'+path189+'</b>最近邀请线（≥'+minLine+'分）<br><span style="font-weight:400;font-size:12px">建议：提升英语至8+、叠加州担保、考虑491偏远地区</span>';
  } else {
    result.className='eoi-result fail';
    result.innerHTML='❌ EOI总分 <b>'+total+'分</b> — 未达到65分入池门槛<br><span style="font-weight:400;font-size:12px">建议检查打分项或转向NIV/482 SID雇主担保路径</span>';
  }
  // Also update EOI table in markdown
  updateEOITable(total);
}

    // find the placeholder paragraph
    var ps=dv.querySelectorAll('p');
    for(var i=0;i<ps.length;i++){
      if(ps[i].textContent.indexOf('__EOI_LIVE__')>=0){
        ph=ps[i]; break;
      }
    }
  }
  if(ph) ph.innerHTML='当前EOI总分: <b style="font-size:18px;color:#006400">'+score+'分</b>';
}
