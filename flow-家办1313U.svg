<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="100%" style="max-width:720px;font-family:system-ui,sans-serif"><defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#b71c1c"/></marker></defs><rect width="720" height="320" fill="#fffaf5" rx="14"/><text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">家族办公室13O/13U路径</text><rect x="50" y="45" width="150" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="125" y="62" text-anchor="middle" font-size="9" font-weight="600">设家办公司</text><text x="125" y="78" text-anchor="middle" font-size="9" fill="#6b7280">13O:S$2,000万</text><text x="125" y="92" text-anchor="middle" font-size="8" fill="#6b7280">13U:S$5,000万</text><line x1="202" y1="70" x2="238" y2="70" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="240" y="45" width="150" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="315" y="62" text-anchor="middle" font-size="9" font-weight="600">申请MAS税务豁免</text><text x="315" y="78" text-anchor="middle" font-size="9" fill="#6b7280">13O/13U批准</text><line x1="392" y1="70" x2="428" y2="70" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="430" y="45" width="150" height="55" rx="10" fill="#fff" stroke="#b71c1c" stroke-width="1.5"/><text x="505" y="62" text-anchor="middle" font-size="9" font-weight="600">3名IP+本地支出</text><text x="505" y="78" text-anchor="middle" font-size="9" fill="#6b7280">资本部署要求</text><line x1="582" y1="70" x2="618" y2="70" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#a)"/><rect x="620" y="45" width="80" height="55" rx="10" fill="#fce4e4" stroke="#b71c1c" stroke-width="2"/><text x="660" y="72" text-anchor="middle" font-size="9" font-weight="600">EP获批</text><line x1="660" y1="102" x2="660" y2="135" stroke="#b71c1c" stroke-width="1.5"/><line x1="660" y1="135" x2="46" y2="135" stroke="#b71c1c" stroke-width="