<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>执行策划案 · 家庭全球规划</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f5f6f8;color:#1f2937;line-height:1.68}
.hero{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;text-align:center;padding:28px 18px}
.hero h1{font-size:20px;margin:0 0 4px}
.hero p{font-size:13px;opacity:.85}
.wrap{max-width:860px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:14px;margin:10px 0 14px;padding:18px;box-shadow:0 2px 8px rgba(15,23,42,.05)}
.card h2{font-size:17px;color:#1a237e;margin-bottom:12px;border-left:4px solid #283593;padding-left:10px}
.card h3{font-size:15px;color:#1a237e;margin:14px 0 8px}
.pill{display:inline-block;background:#e8eaf6;color:#1a237e;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;margin:3px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e5e7eb;border-radius:10px;margin:10px 0}
table{border-collapse:collapse;min-width:600px;width:100%;font-size:13px}
th,td{border-bottom:1px solid #e5e7eb;padding:9px 10px;text-align:left;vertical-align:top}
th{background:#f1f5f9;color:#475569;font-weight:700;font-size:12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{border:0;border-radius:10px;padding:12px 18px;font-weight:700;cursor:pointer;font-size:14px}
.btn-primary{background:#1a237e;color:#fff}
.btn-secondary{background:#e8eaf6;color:#1a237e}
.muted{color:#667085;font-size:13px}
.timeline{border-left:3px solid #c7d2fe;padding-left:16px;margin:10px 0}
.timeline .node{margin:6px 0;font-size:13px;position:relative}
.timeline .node::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;background:#283593}
.section-divider{border:none;border-top:2px solid #e8eaf6;margin:16px 0}
.pwd-card{background:#fff;border-radius:14px;margin:10px 0 14px;padding:18px;box-shadow:0 2px 8px rgba(15,23,42,.05);border:2px solid #e8eaf6}
.pwd-card h2{font-size:17px;color:#1a237e;margin-bottom:6px;border-left:4px solid #283593;padding-left:10px}
.pwd-row{display:flex;gap:8px;margin-top:10px}
.pwd-row input{flex:1;border:1.5px solid #ddd;border-radius:10px;padding:12px;font-size:15px}
.pwd-row button{border:0;border-radius:10px;background:#1a237e;color:#fff;font-weight:700;padding:0 20px;cursor:pointer;white-space:nowrap}
.pwd-msg{margin-top:8px;font-size:13px}
.commission-wrap{display:none;margin-top:12px}
.commission-wrap.show{display:block}
.commission-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.commission-item{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px}
.commission-item b{display:block;color:#1a237e;font-size:15px}
.commission-item span{font-size:12px;color:#667085}
.commission-table{margin-top:12px}
@media(max-width:520px){
  table{min-width:520px}
  .hero h1{font-size:18px}
  .commission-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="hero">
  <h1>📋 执行策划案</h1>
  <p>家庭全球规划 · 客户交付版</p>
</div>
<div class="wrap" id="app"></div>
<script>
var DEFAULT_PASSWORD = '888888';
var COUNTRY_EMOJI = {tr:'🇹🇷',sg:'🇸🇬',au:'🇦🇺',nz:'🇳🇿',us:'🇺🇸',eu:'🇪🇺',hk:'🇭🇰',dm:'🇩🇲',jp:'🇯🇵',vu:'🇻🇺',ge:'🇬🇪'};
var COUNTRY_NAMES = {tr:'土耳其',sg:'新加坡',au:'澳大利亚',nz:'新西兰',us:'美国',eu:'欧洲',hk:'香港',dm:'多米尼克',jp:'日本',vu:'瓦努阿图',ge:'格鲁吉亚'};

function q(k){return new URL(location.href).searchParams.get(k)||''}

var issue = q('issue');
var countriesRaw = q('countries');
var projectsRaw = q('projects');
var countries = countriesRaw ? countriesRaw.split(',') : [];
var projectsParsed = [];
if(projectsRaw){
  projectsRaw.split('|').forEach(function(p){
    var parts = p.split(':');
    if(parts.length >= 2) projectsParsed.push({country:parts[0], project:parts[1]});
  });
}

function renderPlan(){
  var h = '';
  
  // ===== 概览卡片 =====
  h += '<div class="card">';
  h += '<p class="muted">📅 生成时间：' + new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'}) + '　|　方案编号：' + (issue||'N/A') + '</p>';
  h += '<p class="muted">📍 覆盖国家：' + countries.map(function(c){return (COUNTRY_EMOJI[c]||'')+(COUNTRY_NAMES[c]||c);}).join('、') + '</p>';
  h += '<p class="muted">📌 选中项目：<br>';
  projectsParsed.forEach(function(p){h += '<span class="pill">'+(COUNTRY_EMOJI[p.country]||'')+' '+p.project+'</span> ';});
  h += '</p>';
  h += '<div class="actions"><button class="btn btn-secondary" onclick="history.back()">← 返回汇总页</button><button class="btn btn-primary" onclick="window.print()">🖨️ 保存 / 打印 PDF</button></div>';
  h += '</div>';
  
  // ===== 费用清单 =====
  h += '<div class="card"><h2>💰 费用清单</h2>';
  h += '<div class="table-wrap"><table>';
  h += '<tr><th>国家</th><th>项目</th><th>费用项目</th><th>预估金额</th><th>备注</th></tr>';
  
  var feeData = {
    'hk-ttps-a':[{item:'政府申请费',amount:'HK$1,000',note:'入境处收费'},{item:'签证费',amount:'HK$230',note:'获批后支付'},{item:'服务费',amount:'HK$30,000-50,000',note:'中介服务费（市场参考价）'}],
    'hk-ttps-b':[{item:'政府申请费',amount:'HK$1,000',note:'入境处收费'},{item:'签证费',amount:'HK$230',note:'获批后支付'},{item:'服务费',amount:'HK$30,000-50,000',note:'中介服务费（市场参考价）'}],
    'hk-ncies':[{item:'投资金额',amount:'HK$3,000万',note:'合格金融资产'},{item:'政府申请费',amount:'HK$4,750',note:'入境处收费'},{item:'服务费',amount:'HK$100,000-200,000',note:'中介+律师服务费'}],

    'hk-asmtp':[{item:'政府申请费',amount:'HK$4,750',note:'入境处收费'},{item:'服务费',amount:'HK$50,000-80,000',note:'雇主担保+文案'}],

    'sg-techpass-pr':[{item:'Tech.Pass申请费',amount:'S$105',note:'MOM收费'},{item:'服务费',amount:'S$8,000-20,000',note:'Tech.Pass+PR规划'}],
    'sg-gip-a':[{item:'投资金额',amount:'S$1,000万',note:'新设或扩展现有企业'},{item:'申请费',amount:'S$7,000',note:'EDB收费'},{item:'服务费',amount:'S$50,000-100,000',note:'商业计划+律师'}],

    'gr-gv-250k':[{item:'购房金额',amount:'€250,000',note:'商改住/保护建筑'},{item:'税费',amount:'约3-4%',note:'房产交易税'},{item:'政府费用',amount:'€2,000-4,000',note:'居留卡+申请'}],
    'mt-mprp':[{item:'政府捐款',amount:'€28,000-58,000',note:'购房/租房不同金额'},{item:'购房/租房',amount:'€300,000 / €10,000/年',note:'购房或租房'},{item:'慈善捐款',amount:'€2,000',note:'马耳他注册慈善机构'},{item:'律师费',amount:'€8,000-12,000',note:'含尽职调查'}],
    'dm-realestate':[{item:'政府捐款',amount:'US$100,000',note:'经济多元化基金(EDF)'},{item:'购房投资',amount:'US$200,000',note:'持有3-5年'},{item:'尽职调查费',amount:'US$7,500-10,000',note:'主申+配偶+16+子女'},{item:'律师费',amount:'US$5,000-8,000',note:'申请+文件'}],
    'jp-hsp':[{item:'签证申请费',amount:'JP¥4,000-8,000',note:'入管局收费'},{item:'收入要求',amount:'JP¥3,000万/年',note:'高才打分70分+'},{item:'服务费',amount:'JP¥500,000-1,000,000',note:'行政书士+法务'}],
    'jp-biz':[{item:'注册资本',amount:'JP¥500万',note:'经营·管理签证'},{item:'办公室租金',amount:'JP¥300,000-600,000/月',note:'实体办公空间'},{item:'服务费',amount:'JP¥800,000-1,500,000',note:'行政书士+公司设立'}],
    'vu-dsp':[{item:'政府捐款',amount:'US$130,000',note:'单人申请'},{item:'政府捐款(夫妻)',amount:'US$150,000',note:'主申+配偶'},{item:'政府捐款(家庭)',amount:'US$180,000',note:'主申+配偶+2子女'},{item:'尽职调查费',amount:'US$5,000',note:'每名申请人'},{item:'服务费',amount:'US$8,000-15,000',note:'代理+文件'}],
    'ge-invest':[{item:'投资金额',amount:'US$300,000',note:'格鲁吉亚发展方向基金'},{item:'政府费用',amount:'US$5,000-8,000',note:'居留许可+申请'},{item:'服务费',amount:'US$8,000-15,000',note:'律师+文案'}],
  };
  
  // Normalize assessment project codes to feeData keys
  var projectAliases={"ge-invest-realestate":"ge-invest","ge-invest-business":"ge-invest","ge-temp-residence":"ge-invest","ge-temp-rental":"ge-invest","ge-ie-digitalnomad":"ge-invest","ge-ie-freelance":"ge-invest","jp-hsp-70":"jp-hsp","jp-hsp-80":"jp-hsp","jp-super-hsp":"jp-hsp","jp-jskip-income":"jp-biz","jp-biz-2025":"jp-biz","jp-biz-startup":"jp-biz","vu-dsp-single":"vu-dsp","vu-dsp-single-fast":"vu-dsp","vu-dsp-couple":"vu-dsp","vu-dsp-family4":"vu-dsp","vu-dsp-family-big":"vu-dsp","vu-tax-single":"vu-dsp","vu-tax-family":"vu-dsp"};
  projectsParsed.forEach(function(p){
    if(projectAliases[p.project]) p._originalProject=p.project, p.project=projectAliases[p.project];
  });


  var hasFees = false;
  projectsParsed.forEach(function(p){
    var fees = feeData[p.project];
    if(fees){hasFees=true;fees.forEach(function(f){
      h += '<tr><td>'+(COUNTRY_EMOJI[p.country]||'')+' '+(COUNTRY_NAMES[p.country]||p.country)+'</td><td>'+p.project+'</td><td>'+f.item+'</td><td style="font-weight:700">'+f.amount+'</td><td style="font-size:12px;color:#888">'+(f.note||'')+'</td></tr>';
    });}
  });
  if(!hasFees) h += '<tr><td colspan="5" style="text-align:center;color:#888;padding:20px">暂无费用数据，请联系顾问获取详细报价</td></tr>';
  h += '</table></div></div>';
  
  // ===== 三方费用清单 =====
  h += '<div class="card"><h2>🏛️ 三方费用清单（政府/律师/第三方）</h2>';
  h += '<div class="table-wrap"><table>';
  h += '<tr><th>国家</th><th>项目</th><th>费用类别</th><th>收款方</th><th>预估金额</th></tr>';
  var thirdPartyFees = {
    'hk-ttps-a':[{type:'政府',payee:'香港入境处',amount:'HK$1,230'},{type:'公证',payee:'公证处/律师',amount:'HK$2,000-5,000'}],
    'hk-ttps-b':[{type:'政府',payee:'香港入境处',amount:'HK$1,230'},{type:'公证',payee:'公证处/律师',amount:'HK$2,000-5,000'}],

  var has3rd=false;
  projectsParsed.forEach(function(p){

  // ===== 流程周期 =====

  var timelineData={
