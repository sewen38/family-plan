var rawProjects=[];
(q('projects')||'').split('|').forEach(function(item){if(!item)return;var parts=item.split(':');if(parts.length<2)return;var country=parts[0];var raw=decodeSafe(parts.slice(1).join(':'));var key=/^eu-/.test(raw)?'eu-generic':(projectAliases[raw]||raw);rawProjects.push({country:country,raw:raw,key:key,name:projectNames[key]||raw});});
var seen={};rawProjects=rawProjects.filter(function(p){var id=p.country+':'+p.raw;if(seen[id])return false;seen[id]=1;return true;});
if(!countries.length){countries=rawProjects.map(function(p){return p.country}).filter(function(c,i,a){return c&&a.indexOf(c)===i});}
var projectsByCountry={};
rawProjects.forEach(function(p){projectsByCountry[p.country]=projectsByCountry[p.country]||[];projectsByCountry[p.country].push(p);});
function countryProjectList(c){return projectsByCountry[c]||[];}
function countryLabel(c){return (COUNTRY_EMOJI[c]||'')+' '+(COUNTRY_NAMES[c]||c)}
function countryBlock(c, renderer){
  var ps=countryProjectList(c);
  var body=renderer(c,ps);
  return '<h3>'+esc(countryLabel(c))+'</h3>'+body;
}
function byCountry(renderer){
  var cs=countries.length?countries:Object.keys(projectsByCountry);
  if(!cs.length)return '<p class="muted">暂无选中国家/项目。</p>';
  return cs.map(function(c){return countryBlock(c,renderer);}).join('');
}
function projectListHtml(ps){
  if(!ps.length)return '<p class="muted">该国家本轮评估无用户勾选项目。</p>';
  return '<div class="grid">'+ps.map(function(p){return '<div class="mini"><b>'+esc(p.name)+'</b><span class="muted">项目代码：'+esc(p.raw)+'</span></div>'}).join('')+'</div>';
}
function section(n,title,body){return '<div class="card"><h2>'+n+' · '+title+'</h2>'+body+'</div>'}
function projectCards(){if(!rawProjects.length)return '<p class="muted">当前未选择任何项目，请返回评估汇总页选择项目。</p>';return rawProjects.map(function(p){return '<div class="mini"><b>'+esc(countryLabel(p.country))+'｜'+esc(p.name)+'</b><span class="muted">项目代码：'+esc(p.raw)+'</span></div>'}).join('')}
function feeRows(){var h='';rawProjects.forEach(function(p){h+='<tr><td>'+esc(countryLabel(p.country))+'</td><td>'+esc(p.name)+'</td><td>'+esc(feeData[p.key]||'需按个案报价')+'</td><td>'+esc(cycleData[p.key]||'需按个案确认')+'</td></tr>'});return h||'<tr><td colspan="4">暂无选中项目</td></tr>'}

function needsCalculator(c, ps){
  if(c==='sg') return true;
  if(c==='jp') return true;
  if(c==='nz') return true;
  if(c==='au') return true;
  return false;
}
function calculatorBlock(c, ps){
  if(c==='sg')return '<div class="calc-box"><h3>🇸🇬 新加坡 COMPASS 快速测算</h3><div class="calc-grid"><label>月薪<select id="sg_salary"><option value="10">达标</option><option value="20">高于同龄同业65%</option></select></label><label>学历<select id="sg_degree"><option value="10">本科/同等</option><option value="20">顶尖院校</option></select></label><label>多元化<select id="sg_div"><option value="10">达标</option><option value="20">优势</option></select></label><label>本地雇佣<select id="sg_local"><option value="10">达标</option><option value="20">优势</option></select></label></div><button class="btn secondary" onclick="calcSG()">计算 COMPASS</button><div class="calc-score" id="sg_score">最低需 40 分；点击计算。</div></div>';
  if(c==='jp')return '<div class="calc-box"><h3>🇯🇵 日本高才 HSP 快速测算</h3><div class="calc-grid"><label>学历<select id="jp_edu"><option value="20">硕士</option><option value="30">博士</option><option value="10">本科</option></select></label><label>年收<select id="jp_income"><option value="40">3000万日元+</option><option value="30">2000万日元+</option><option value="20">1000万日元+</option></select></label><label>年龄<select id="jp_age"><option value="15">30岁以下</option><option value="10">35岁以下</option><option value="5">40岁以下</option><option value="0">40岁以上</option></select></label><label>经验<select id="jp_exp"><option value="15">10年以上</option><option value="10">7年以上</option><option value="5">3年以上</option></select></label></div><button class="btn secondary" onclick="calcJP()">计算 HSP</button><div class="calc-score" id="jp_score">70分可高才；80分可更快永住。</div></div>';
  if(c==='nz')return '<div class="calc-box"><h3>🇳🇿 新西兰 SMC 6分制快速测算</h3><div class="calc-grid"><label>核心资格<select id="nz_core"><option value="6">博士/注册职业/高薪6分</option><option value="5">硕士/高薪5分</option><option value="4">本科荣誉/高薪4分</option><option value="3">本科/技能3分</option></select></label><label>新西兰工作<select id="nz_work"><option value="0">无</option><option value="1">1年</option><option value="2">2年</option><option value="3">3年</option></select></label></div><button class="btn secondary" onclick="calcNZ()">计算 SMC</button><div class="calc-score" id="nz_score">总分需 ≥6 分。</div></div>';
  if(c==='au')return '<div class="calc-box"><h3>🇦🇺 澳大利亚 EOI 快速测算</h3><div class="calc-grid"><label>年龄<select id="au_age"><option value="30">25-32岁</option><option value="25">33-39岁</option><option value="15">40-44岁</option></select></label><label>英语<select id="au_en"><option value="20">Superior</option><option value="10">Proficient</option><option value="0">Competent</option></select></label><label>学历<select id="au_edu"><option value="20">博士</option><option value="15">本科/硕士</option><option value="10">专科/技校</option></select></label><label>工作经验<select id="au_exp"><option value="15">8年以上</option><option value="10">5年以上</option><option value="5">3年以上</option><option value="0">不足3年</option></select></label></div><button class="btn secondary" onclick="calcAU()">计算 EOI</button><div class="calc-score" id="au_score">65分为门槛，热门职业通常需更高。</div></div>';
  return '';
}
function renderCalculators(){var cs=countries.filter(function(c){return needsCalculator(c,countryProjectList(c));});if(!cs.length)return '';return '<div class="card"><h2>顶部计算器专区</h2><p class="muted">按用户选择国家顺序展示涉及计算器的国家/项目。以下测算仅用于初筛，正式评分以主管机关和持牌顾问复核为准。</p>'+cs.map(function(c){return calculatorBlock(c,countryProjectList(c));}).join('')+'</div>';}
function calcSG(){var s=+sg_salary.value + +sg_degree.value + +sg_div.value + +sg_local.value;sg_score.textContent='COMPASS 估算：'+s+' 分（≥40 通常达标）';}

function calcAU(){var s=+au_age.value + +au_en.value + +au_edu.value + +au_exp.value;au_score.textContent='EOI 估算：'+s+' 分（65 为门槛，实际邀请分更高）';}

h+=renderCalculators();
